<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="'Helvetica Neue', Arial, sans-serif">
  <rect width="800" height="440" fill="#F5F4F0" rx="16"/>
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1A1917">専攻医の給与→手取り計算フロー</text>
  <text x="400" y="60" text-anchor="middle" font-size="13" fill="#6B6760">社会保険・税金の控除項目を図解</text>

  <!-- Gross salary -->
  <rect x="250" y="80" width="300" height="50" rx="12" fill="#1B4F3A"/>
  <text x="400" y="111" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">額面給与（月収 35〜50万円）</text>

  <!-- Arrow -->
  <line x1="400" y1="130" x2="400" y2="155" stroke="#1B4F3A" stroke-width="2"/>
  <polygon points="394,155 400,168 406,155" fill="#1B4F3A"/>

  <!-- Deductions box -->
  <rect x="100" y="170" width="600" height="170" rx="12" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1.5"/>
  <text x="400" y="195" text-anchor="middle" font-size="14" font-weight="bold" fill="#1A1917">控除項目（額面の約25〜30%）</text>

  <!-- Social insurance -->
  <rect x="125" y="210" width="170" height="55" rx="8" fill="#E8F0EC"/>
  <text x="210" y="232" text-anchor="middle" font-size="12" font-weight="600" fill="#1B4F3A">健康保険</text>
  <text x="210" y="252" text-anchor="middle" font-size="11" fill="#6B6760">約 5% (2〜2.5万)</text>

  <rect x="315" y="210" width="170" height="55" rx="8" fill="#E8F0EC"/>
  <text x="400" y="232" text-anchor="middle" font-size="12" font-weight="600" fill="#1B4F3A">厚生年金</text>
  <text x="400" y="252" text-anchor="middle" font-size="11" fill="#6B6760">約 9% (3〜4.5万)</text>

  <rect x="505" y="210" width="170" height="55" rx="8" fill="#E8F0EC"/>
  <text x="590" y="232" text-anchor="middle" font-size="12" font-weight="600" fill="#1B4F3A">雇用保険</text>
  <text x="590" y="252" text-anchor="middle" font-size="11" fill="#6B6760">約 0.6% (2〜3千)</text>

  <!-- Taxes -->
  <rect x="190" y="275" width="200" height="50" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="290" y="297" text-anchor="middle" font-size="12" font-weight="600" fill="#92400E">所得税</text>
  <text x="290" y="315" text-anchor="middle" font-size="11" fill="#6B6760">約 5〜10% (2〜5万)</text>

  <rect x="410" y="275" width="200" height="50" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="510" y="297" text-anchor="middle" font-size="12" font-weight="600" fill="#92400E">住民税</text>
  <text x="510" y="315" text-anchor="middle" font-size="11" fill="#6B6760">約 10% (3.5〜5万)</text>

  <!-- Arrow -->
  <line x1="400" y1="340" x2="400" y2="365" stroke="#1B4F3A" stroke-width="2"/>
  <polygon points="394,365 400,378 406,365" fill="#1B4F3A"/>

  <!-- Take-home -->
  <rect x="200" y="378" width="400" height="50" rx="12" fill="#86EFAC" stroke="#1B4F3A" stroke-width="2"/>
  <text x="400" y="409" text-anchor="middle" font-size="16" font-weight="bold" fill="#1B4F3A">手取り: 月収 25〜37万円（約70〜75%）</text>

  <text x="400" y="436" text-anchor="middle" font-size="11" fill="#6B6760">© 内科ナビ naikanavi.com ※ バイト収入は別途確定申告が必要</text>
</svg>
