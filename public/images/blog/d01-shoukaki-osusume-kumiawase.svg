  <text x="448" y="158" font-size="13" font-weight="bold" fill="#1A1917">潰瘍性大腸炎（疾患群4）</text>
  <text x="448" y="178" font-size="11" fill="#6B6760">鑑別診断 - 寛解導入/維持 - 生物学的製剤</text>
  <text x="710" y="138" font-size="10" fill="#155230" text-anchor="end">考察の深さ &#x2605;&#x2605;&#x2605;</text>

  <!-- B: 肝臓 -->
  <rect x="428" y="206" width="324" height="80" rx="8" fill="#F5F4F0"/>
  <rect x="428" y="206" width="6" height="80" rx="3" fill="#155230"/>
  <text x="448" y="226" font-size="12" font-weight="bold" fill="#155230">肝臓</text>
  <text x="448" y="246" font-size="13" font-weight="bold" fill="#1A1917">肝細胞癌（疾患群5）</text>
  <text x="448" y="266" font-size="11" fill="#6B6760">Barcelona分類 - 治療選択 - 背景肝評価</text>
  <text x="710" y="226" font-size="10" fill="#155230" text-anchor="end">考察の深さ &#x2605;&#x2605;&#x2605;</text>

  <!-- B: 胆膵 -->
  <rect x="428" y="294" width="324" height="80" rx="8" fill="#F5F4F0"/>
  <rect x="428" y="294" width="6" height="80" rx="3" fill="#155230"/>
  <text x="448" y="314" font-size="12" font-weight="bold" fill="#155230">胆膵</text>
  <text x="448" y="334" font-size="13" font-weight="bold" fill="#1A1917">自己免疫性膵炎（疾患群8）</text>
  <text x="448" y="354" font-size="11" fill="#6B6760">IgG4関連疾患鑑別 - 診断基準 - ステロイド治療</text>
  <text x="710" y="314" font-size="10" fill="#155230" text-anchor="end">考察の深さ &#x2605;&#x2605;&#x2605;</text>

  <!-- Footer -->
  <text x="400" y="425" text-anchor="middle" font-size="10" fill="#6B6760">© 内科ナビ naikanavi.com</text>
