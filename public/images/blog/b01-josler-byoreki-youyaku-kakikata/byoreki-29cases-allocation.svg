<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Noto Sans JP', 'Hiragino Sans', sans-serif">
  <defs>
    <filter id="s" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1A1917" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" rx="16" fill="#F5F4F0"/>

  <!-- Title bar -->
  <rect x="24" y="16" width="752" height="48" rx="12" fill="#1B4F3A"/>
  <text x="400" y="47" text-anchor="middle" fill="#FEFEFC" font-size="20" font-weight="700">病歴要約 29症例の配分マップ</text>

  <!-- Grid: 4 columns x 4 rows -->
  <!-- Row 1 -->
  <rect x="30" y="80" width="175" height="72" rx="10" fill="#FEFEFC" stroke="#1B4F3A" stroke-width="2" filter="url(#s)"/>
  <text x="38" y="100" fill="#1B4F3A" font-size="11" font-weight="600">No.1-2</text>
  <text x="38" y="120" fill="#1A1917" font-size="14" font-weight="700">総合内科（一般）</text>
  <text x="160" y="140" text-anchor="end" fill="#1B4F3A" font-size="22" font-weight="700">2例</text>

  <rect x="215" y="80" width="175" height="72" rx="10" fill="#FEFEFC" stroke="#1B4F3A" stroke-width="2" filter="url(#s)"/>
  <text x="223" y="100" fill="#1B4F3A" font-size="11" font-weight="600">No.3</text>
  <text x="223" y="120" fill="#1A1917" font-size="14" font-weight="700">総合内科（高齢者）</text>
  <text x="345" y="140" text-anchor="end" fill="#1B4F3A" font-size="22" font-weight="700">1例</text>

  <rect x="400" y="80" width="188" height="72" rx="10" fill="#FEF3C7" stroke="#FCD34D" stroke-width="2" filter="url(#s)"/>
  <text x="408" y="100" fill="#92400E" font-size="11" font-weight="600">No.4-6 ⚠ 3分野必須</text>
  <text x="408" y="120" fill="#1A1917" font-size="14" font-weight="700">消化器</text>
  <text x="543" y="140" text-anchor="end" fill="#92400E" font-size="22" font-weight="700">3例</text>
  <text x="408" y="140" fill="#92400E" font-size="9">消化管+肝臓+胆膵 各1以上</text>

  <rect x="598" y="80" width="175" height="72" rx="10" fill="#FEFEFC" stroke="#1B4F3A" stroke-width="2" filter="url(#s)"/>
  <text x="606" y="100" fill="#1B4F3A" font-size="11" font-weight="600">No.7-8</text>
  <text x="606" y="120" fill="#1A1917" font-size="14" font-weight="700">循環器</text>
  <text x="728" y="140" text-anchor="end" fill="#1B4F3A" font-size="22" font-weight="700">2例</text>

  <!-- Row 2 -->
  <rect x="30" y="164" width="175" height="72" rx="10" fill="#FEF3C7" stroke="#FCD34D" stroke-width="2" filter="url(#s)"/>
  <text x="38" y="184" fill="#92400E" font-size="11" font-weight="600">No.9-11 ⚠ 各1以上</text>
  <text x="38" y="204" fill="#1A1917" font-size="14" font-weight="700">内分泌・代謝</text>
  <text x="160" y="224" text-anchor="end" fill="#92400E" font-size="22" font-weight="700">3例</text>
  <text x="38" y="224" fill="#92400E" font-size="9">内分泌1+代謝1+自由1</text>

  <rect x="215" y="164" width="175" height="72" rx="10" fill="#FEFEFC" stroke="#1B4F3A" stroke-width="2" filter="url(#s)"/>
  <text x="223" y="184" fill="#1B4F3A" font-size="11" font-weight="600">No.12-13</text>
  <text x="223" y="204" fill="#1A1917" font-size="14" font-weight="700">腎臓</text>
  <text x="345" y="224" text-anchor="end" fill="#1B4F3A" font-size="22" font-weight="700">2例</text>

  <rect x="400" y="164" width="188" height="72" rx="10" fill="#FEFEFC" stroke="#1B4F3A" stroke-width="2" filter="url(#s)"/>
  <text x="408" y="184" fill="#1B4F3A" font-size="11" font-weight="600">No.14-15</text>
  <text x="408" y="204" fill="#1A1917" font-size="14" font-weight="700">呼吸器</text>
  <text x="543" y="224" text-anchor="end" fill="#1B4F3A" font-size="22" font-weight="700">2例</text>

  <rect x="598" y="164" width="175" height="72" rx="10" fill="#FEFEFC" stroke="#1B4F3A" stroke-width="2" filter="url(#s)"/>
  <text x="606" y="184" fill="#1B4F3A" font-size="11" font-weight="600">No.16-17</text>
  <text x="606" y="204" fill="#1A1917" font-size="14" font-weight="700">血液</text>
  <text x="728" y="224" text-anchor="end" fill="#1B4F3A" font-size="22" font-weight="700">2例</text>

  <!-- Row 3 -->
  <rect x="30" y="248" width="175" height="72" rx="10" fill="#FEFEFC" stroke="#1B4F3A" stroke-width="2" filter="url(#s)"/>
  <text x="38" y="268" fill="#1B4F3A" font-size="11" font-weight="600">No.18-19</text>
  <text x="38" y="288" fill="#1A1917" font-size="14" font-weight="700">神経</text>
  <text x="160" y="308" text-anchor="end" fill="#1B4F3A" font-size="22" font-weight="700">2例</text>

  <rect x="215" y="248" width="175" height="72" rx="10" fill="#FEFEFC" stroke="#1B4F3A" stroke-width="2" filter="url(#s)"/>
  <text x="223" y="268" fill="#1B4F3A" font-size="11" font-weight="600">No.20-21</text>
  <text x="223" y="288" fill="#1A1917" font-size="14" font-weight="700">アレルギー・膠原病</text>
  <text x="345" y="308" text-anchor="end" fill="#1B4F3A" font-size="22" font-weight="700">2例</text>

  <rect x="400" y="248" width="188" height="72" rx="10" fill="#FEFEFC" stroke="#1B4F3A" stroke-width="2" filter="url(#s)"/>
  <text x="408" y="268" fill="#1B4F3A" font-size="11" font-weight="600">No.22-23</text>
  <text x="408" y="288" fill="#1A1917" font-size="14" font-weight="700">感染症</text>
  <text x="543" y="308" text-anchor="end" fill="#1B4F3A" font-size="22" font-weight="700">2例</text>

  <rect x="598" y="248" width="175" height="72" rx="10" fill="#FEFEFC" stroke="#1B4F3A" stroke-width="2" filter="url(#s)"/>
  <text x="606" y="268" fill="#1B4F3A" font-size="11" font-weight="600">No.24-26</text>
  <text x="606" y="288" fill="#1A1917" font-size="14" font-weight="700">救急</text>
  <text x="728" y="308" text-anchor="end" fill="#1B4F3A" font-size="22" font-weight="700">3例</text>

  <!-- Row 4: 特殊枠 -->
  <rect x="30" y="336" width="360" height="72" rx="10" fill="#E8F0EC" stroke="#1B4F3A" stroke-width="2" filter="url(#s)"/>
  <text x="38" y="356" fill="#1B4F3A" font-size="11" font-weight="600">No.27-28 ★疾患群重複OK</text>
  <text x="38" y="378" fill="#1A1917" font-size="14" font-weight="700">外科紹介症例</text>
  <text x="345" y="396" text-anchor="end" fill="#1B4F3A" font-size="22" font-weight="700">2例</text>
  <text x="38" y="396" fill="#6B6760" font-size="10">外科に治療を依頼した内科症例</text>

  <rect x="400" y="336" width="373" height="72" rx="10" fill="#E8F0EC" stroke="#1B4F3A" stroke-width="2" filter="url(#s)"/>
  <text x="408" y="356" fill="#1B4F3A" font-size="11" font-weight="600">No.29 ★疾患群重複OK</text>
  <text x="408" y="378" fill="#1A1917" font-size="14" font-weight="700">剖検症例</text>
  <text x="728" y="396" text-anchor="end" fill="#1B4F3A" font-size="22" font-weight="700">1例</text>
  <text x="408" y="396" fill="#6B6760" font-size="10">剖検所見と臨床経過を対比して考察</text>

  <!-- Note box -->
  <rect x="30" y="422" width="743" height="80" rx="10" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1.5"/>
  <text x="48" y="444" fill="#991B1B" font-size="13" font-weight="700">⚠ 見落とし注意ポイント</text>
  <text x="48" y="464" fill="#991B1B" font-size="12">・29症例はすべて異なる疾患群から作成（外科紹介・剖検のみ重複可）</text>
  <text x="48" y="480" fill="#991B1B" font-size="12">・外来症例は最大7篇まで ・初期研修症例は最大14篇まで（3条件あり）</text>
  <text x="48" y="496" fill="#991B1B" font-size="12">・消化器の疾患群9（急性腹症等）は消化器分野では使用不可（救急・外科紹介・剖検なら可）</text>

  <!-- Footer -->
  <text x="780" y="516" text-anchor="end" fill="#C8C4BC" font-size="10">© 内科ナビ naikanavi.com</text>
</svg>
