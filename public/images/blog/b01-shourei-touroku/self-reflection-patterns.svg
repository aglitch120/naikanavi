  <!-- Pattern 3 -->
  <rect x="536" y="60" width="235" height="200" rx="12" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1.5"/>
  <circle cx="653" cy="100" r="22" fill="#EDE9FE"/>
  <text x="653" y="106" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="20">📚</text>
  <text x="653" y="140" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="#4338CA">知識の深化型</text>
  <text x="653" y="165" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="11" fill="#6B6760">文献的な学びを記述</text>
