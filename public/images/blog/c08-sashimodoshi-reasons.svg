<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="'Helvetica Neue', Arial, sans-serif">
  <rect width="800" height="480" fill="#F5F4F0" rx="16"/>
  <text x="400" y="44" text-anchor="middle" font-size="20" font-weight="bold" fill="#1A1917">病歴要約が差し戻される主な理由</text>
  <text x="400" y="68" text-anchor="middle" font-size="13" fill="#6B6760">Revision/Rejectにつながりやすいポイント</text>

  <!-- Reason 1 -->
  <rect x="40" y="95" width="720" height="58" rx="10" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1"/>
  <circle cx="76" cy="124" r="18" fill="#1B4F3A"/>
  <text x="76" y="130" text-anchor="middle" font-size="16" font-weight="bold" fill="white">1</text>
  <text x="110" y="118" font-size="15" font-weight="bold" fill="#1A1917">総合考察が浅い・全人的視点の欠如</text>
  <text x="110" y="138" font-size="12" fill="#6B6760">主病名の医学的考察のみで、社会的背景・患者の価値観への言及がない</text>

  <!-- Reason 2 -->
  <rect x="40" y="165" width="720" height="58" rx="10" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1"/>
  <circle cx="76" cy="194" r="18" fill="#1B4F3A"/>
  <text x="76" y="200" text-anchor="middle" font-size="16" font-weight="bold" fill="white">2</text>
  <text x="110" y="188" font-size="15" font-weight="bold" fill="#1A1917">疾患群と考察内容のミスマッチ</text>
  <text x="110" y="208" font-size="12" fill="#6B6760">主病名の疾患群ではなく、副病名や原因疾患に考察の焦点がずれている</text>

  <!-- Reason 3 -->
  <rect x="40" y="235" width="720" height="58" rx="10" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1"/>
  <circle cx="76" cy="264" r="18" fill="#1B4F3A"/>
  <text x="76" y="270" text-anchor="middle" font-size="16" font-weight="bold" fill="white">3</text>
  <text x="110" y="258" font-size="15" font-weight="bold" fill="#1A1917">A4用紙2枚の分量ルール違反</text>
  <text x="110" y="278" font-size="12" fill="#6B6760">PDF出力がA4×2枚を超過、または紙面の80%未満しか埋まっていない</text>

  <!-- Reason 4 -->
  <rect x="40" y="305" width="720" height="58" rx="10" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1"/>
  <circle cx="76" cy="334" r="18" fill="#1B4F3A"/>
  <text x="76" y="340" text-anchor="middle" font-size="16" font-weight="bold" fill="white">4</text>
  <text x="110" y="328" font-size="15" font-weight="bold" fill="#1A1917">文献引用の形式不備</text>
  <text x="110" y="348" font-size="12" fill="#6B6760">引用形式の不統一、UpToDateのみの引用、本文中の引用番号と文献リストの不一致</text>

  <!-- Reason 5 -->
  <rect x="40" y="375" width="720" height="58" rx="10" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1"/>
  <circle cx="76" cy="404" r="18" fill="#1B4F3A"/>
  <text x="76" y="410" text-anchor="middle" font-size="16" font-weight="bold" fill="white">5</text>
  <text x="110" y="398" font-size="15" font-weight="bold" fill="#1A1917">誤字脱字・記載の不整合</text>
  <text x="110" y="418" font-size="12" fill="#6B6760">薬剤名の誤り、検査値の単位ミス、プロブレムリストと経過の不一致</text>

  <!-- Footer -->
  <text x="400" y="465" text-anchor="middle" font-size="11" fill="#6B6760">© 内科ナビ naikanavi.com</text>
</svg>
