<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Helvetica Neue', Arial, sans-serif">
  <rect width="800" height="520" fill="#F5F4F0" rx="16"/>
  <text x="400" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#1A1917">差し戻し時の対応フロー</text>
  <text x="400" y="62" text-anchor="middle" font-size="13" fill="#6B6760">Revision/Rejectそれぞれの対処法</text>

  <!-- Left: Revision -->
  <rect x="40" y="90" width="340" height="380" rx="12" fill="#E8F0EC" stroke="#1B4F3A" stroke-width="2"/>
  <rect x="60" y="105" width="140" height="32" rx="6" fill="#1B4F3A"/>
  <text x="130" y="126" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Revision（要修正）</text>

  <rect x="70" y="155" width="280" height="40" rx="8" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1"/>
  <text x="210" y="175" text-anchor="middle" font-size="12" fill="#1A1917">1. 査読委員のコメントを精読する</text>
  <line x1="210" y1="195" x2="210" y2="210" stroke="#1B4F3A" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="70" y="210" width="280" height="40" rx="8" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1"/>
  <text x="210" y="230" text-anchor="middle" font-size="12" fill="#1A1917">2. 指摘箇所を特定し修正案を作成</text>
  <line x1="210" y1="250" x2="210" y2="265" stroke="#1B4F3A" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="70" y="265" width="280" height="40" rx="8" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1"/>
  <text x="210" y="285" text-anchor="middle" font-size="12" fill="#1A1917">3. 病歴要約を修正（同じ症例で）</text>
  <line x1="210" y1="305" x2="210" y2="320" stroke="#1B4F3A" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="70" y="320" width="280" height="40" rx="8" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1"/>
  <text x="210" y="340" text-anchor="middle" font-size="12" fill="#1A1917">4. 再度評価依頼を送信</text>
  <line x1="210" y1="360" x2="210" y2="375" stroke="#1B4F3A" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="70" y="375" width="280" height="40" rx="8" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <text x="210" y="395" text-anchor="middle" font-size="12" font-weight="bold" fill="#166534">7日以内を目安に再評価</text>

  <text x="210" y="440" text-anchor="middle" font-size="11" fill="#1B4F3A">何度でも修正可能</text>

  <!-- Right: Reject -->
  <rect x="420" y="90" width="340" height="380" rx="12" fill="#FEE2E2" stroke="#991B1B" stroke-width="2"/>
  <rect x="440" y="105" width="155" height="32" rx="6" fill="#991B1B"/>
  <text x="517" y="126" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Reject（要差替え）</text>

  <rect x="450" y="155" width="280" height="40" rx="8" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1"/>
  <text x="590" y="175" text-anchor="middle" font-size="12" fill="#1A1917">1. コメントで不適格の理由を確認</text>
  <line x1="590" y1="195" x2="590" y2="210" stroke="#991B1B" stroke-width="2" marker-end="url(#arrowR)"/>

  <rect x="450" y="210" width="280" height="40" rx="8" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1"/>
  <text x="590" y="230" text-anchor="middle" font-size="12" fill="#1A1917">2. 別の症例で病歴要約を新規作成</text>
  <line x1="590" y1="250" x2="590" y2="265" stroke="#991B1B" stroke-width="2" marker-end="url(#arrowR)"/>

  <rect x="450" y="265" width="280" height="40" rx="8" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1"/>
  <text x="590" y="285" text-anchor="middle" font-size="12" fill="#1A1917">3. 疾患群の重複がないか確認</text>
  <line x1="590" y1="305" x2="590" y2="320" stroke="#991B1B" stroke-width="2" marker-end="url(#arrowR)"/>

  <rect x="450" y="320" width="280" height="40" rx="8" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1"/>
  <text x="590" y="340" text-anchor="middle" font-size="12" fill="#1A1917">4. 差替え後に再度評価依頼</text>
  <line x1="590" y1="360" x2="590" y2="375" stroke="#991B1B" stroke-width="2" marker-end="url(#arrowR)"/>

  <rect x="450" y="375" width="280" height="40" rx="8" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <text x="590" y="395" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400E">初回評価時のみ選択可能</text>

  <text x="590" y="440" text-anchor="middle" font-size="11" fill="#991B1B">症例自体の差替えが必要</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1B4F3A"/>
    </marker>
    <marker id="arrowR" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#991B1B"/>
    </marker>
  </defs>

  <!-- Footer -->
  <text x="400" y="505" text-anchor="middle" font-size="11" fill="#6B6760">© 内科ナビ naikanavi.com</text>
</svg>
