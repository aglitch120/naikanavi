<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="'Noto Sans JP', 'Hiragino Sans', sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" rx="16" fill="#F5F4F0"/>

  <!-- Title -->
  <text x="400" y="44" text-anchor="middle" font-size="20" font-weight="bold" fill="#1A1917">全人的視点を構成する4つの軸</text>

  <!-- Center circle -->
  <circle cx="400" cy="220" r="54" fill="#1B4F3A"/>
  <text x="400" y="214" text-anchor="middle" font-size="13" font-weight="bold" fill="white">全人的</text>
  <text x="400" y="232" text-anchor="middle" font-size="13" font-weight="bold" fill="white">視点</text>

  <!-- Axis 1: 社会的背景 (top-left) -->
  <rect x="40" y="80" width="200" height="110" rx="12" fill="#FEFEFC" stroke="#DDD9D2" filter="url(#shadow)"/>
  <rect x="40" y="80" width="200" height="36" rx="12" fill="#1E3A5F"/>
  <rect x="40" y="104" width="200" height="12" fill="#1E3A5F"/>
  <text x="68" y="102" font-size="13" font-weight="bold" fill="white">📋 軸1：社会的背景</text>
  <text x="56" y="138" font-size="11" fill="#6B6760">職業・家族構成・経済状況</text>
  <text x="56" y="156" font-size="11" fill="#6B6760">住環境・介護力</text>
  <text x="56" y="176" font-size="10" fill="#1B4F3A" font-weight="bold">→ 最も書きやすい軸</text>
  <line x1="240" y1="145" x2="346" y2="200" stroke="#1E3A5F" stroke-width="2" stroke-dasharray="6,4" opacity="0.4"/>

  <!-- Axis 2: 心理的側面 (top-right) -->
  <rect x="560" y="80" width="200" height="110" rx="12" fill="#FEFEFC" stroke="#DDD9D2" filter="url(#shadow)"/>
  <rect x="560" y="80" width="200" height="36" rx="12" fill="#4338CA"/>
  <rect x="560" y="104" width="200" height="12" fill="#4338CA"/>
  <text x="588" y="102" font-size="13" font-weight="bold" fill="white">💭 軸2：心理的側面</text>
  <text x="576" y="138" font-size="11" fill="#6B6760">疾患受容・治療への不安</text>
  <text x="576" y="156" font-size="11" fill="#6B6760">精神的サポート</text>
  <text x="576" y="176" font-size="10" fill="#4338CA" font-weight="bold">→ 悪性腫瘍・終末期で有効</text>
  <line x1="560" y1="145" x2="454" y2="200" stroke="#4338CA" stroke-width="2" stroke-dasharray="6,4" opacity="0.4"/>

  <!-- Axis 3: 退院後の生活 (bottom-left) -->
  <rect x="40" y="240" width="200" height="110" rx="12" fill="#FEFEFC" stroke="#DDD9D2" filter="url(#shadow)"/>
  <rect x="40" y="240" width="200" height="36" rx="12" fill="#0D7377"/>
  <rect x="40" y="264" width="200" height="12" fill="#0D7377"/>
  <text x="68" y="262" font-size="13" font-weight="bold" fill="white">🏠 軸3：退院後の生活</text>
  <text x="56" y="298" font-size="11" fill="#6B6760">退院支援・多職種連携</text>
  <text x="56" y="316" font-size="11" fill="#6B6760">社会資源の活用</text>
  <text x="56" y="336" font-size="10" fill="#0D7377" font-weight="bold">→ 高齢者・慢性疾患で有効</text>
  <line x1="240" y1="290" x2="346" y2="240" stroke="#0D7377" stroke-width="2" stroke-dasharray="6,4" opacity="0.4"/>

  <!-- Axis 4: 患者の意向 SDM (bottom-right) -->
  <rect x="560" y="240" width="200" height="110" rx="12" fill="#FEFEFC" stroke="#DDD9D2" filter="url(#shadow)"/>
  <rect x="560" y="240" width="200" height="36" rx="12" fill="#92400E"/>
  <rect x="560" y="264" width="200" height="12" fill="#92400E"/>
  <text x="588" y="262" font-size="13" font-weight="bold" fill="white">🤝 軸4：患者の意向</text>
  <text x="576" y="298" font-size="11" fill="#6B6760">共同意思決定（SDM）</text>
  <text x="576" y="316" font-size="11" fill="#6B6760">治療選択への参画</text>
  <text x="576" y="336" font-size="10" fill="#92400E" font-weight="bold">→ 選択肢が複数ある症例で</text>
  <line x1="560" y1="290" x2="454" y2="240" stroke="#92400E" stroke-width="2" stroke-dasharray="6,4" opacity="0.4"/>

  <!-- Footer -->
  <text x="400" y="395" text-anchor="middle" font-size="12" fill="#1B4F3A" font-weight="bold">症例に応じて2〜3軸を選んで具体的に記載</text>
  <text x="780" y="412" text-anchor="end" font-size="9" fill="#6B6760">© 内科ナビ naikanavi.com</text>
</svg>
