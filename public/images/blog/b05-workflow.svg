<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" fill="none">
  <rect width="800" height="320" rx="16" fill="#F5F4F0"/>
  
  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="18" fill="#1A1917">テンプレ活用ワークフロー：1件5分で終わらせる流れ</text>
  
  <!-- Step 1 -->
  <rect x="30" y="65" width="160" height="100" rx="12" fill="#FEFEFC" stroke="#1B4F3A" stroke-width="2"/>
  <circle cx="60" cy="85" r="14" fill="#1B4F3A"/>
  <text x="60" y="90" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="14" fill="white">1</text>
  <text x="120" y="88" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="12" fill="#1A1917">サマリー一覧化</text>
  <text x="110" y="115" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6B6760">退院サマリーを</text>
  <text x="110" y="130" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6B6760">リストアップ</text>
  <text x="110" y="150" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1B4F3A">所要: 30分/月</text>

  <!-- Arrow 1 -->
  <polygon points="200,115 220,115 220,108 235,118 220,128 220,121 200,121" fill="#1B4F3A"/>

  <!-- Step 2 -->
  <rect x="240" y="65" width="160" height="100" rx="12" fill="#FEFEFC" stroke="#3D5A80" stroke-width="2"/>
  <circle cx="270" cy="85" r="14" fill="#3D5A80"/>
  <text x="270" y="90" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="14" fill="white">2</text>
  <text x="335" y="88" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="12" fill="#1A1917">パターン分類</text>
  <text x="320" y="115" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6B6760">4パターンに</text>
  <text x="320" y="130" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6B6760">振り分ける</text>
  <text x="320" y="150" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#3D5A80">所要: 1分/件</text>

  <!-- Arrow 2 -->
  <polygon points="410,115 430,115 430,108 445,118 430,128 430,121 410,121" fill="#3D5A80"/>

  <!-- Step 3 -->
  <rect x="450" y="65" width="160" height="100" rx="12" fill="#FEFEFC" stroke="#7F1D1D" stroke-width="2"/>
  <circle cx="480" cy="85" r="14" fill="#7F1D1D"/>
  <text x="480" y="90" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="14" fill="white">3</text>
  <text x="545" y="88" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="12" fill="#1A1917">バッチ処理</text>
  <text x="530" y="115" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6B6760">同パターン5件を</text>
  <text x="530" y="130" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6B6760">まとめて記載</text>
  <text x="530" y="150" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#7F1D1D">所要: 5分/件</text>

  <!-- Arrow 3 -->
  <polygon points="620,115 640,115 640,108 655,118 640,128 640,121 620,121" fill="#7F1D1D"/>

  <!-- Step 4 -->
  <rect x="660" y="65" width="110" height="100" rx="12" fill="#FEFEFC" stroke="#4338CA" stroke-width="2"/>
  <circle cx="690" cy="85" r="14" fill="#4338CA"/>
  <text x="690" y="90" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="14" fill="white">4</text>
  <text x="715" y="88" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="12" fill="#1A1917">提出</text>
  <text x="715" y="115" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6B6760">セルフチェック</text>
  <text x="715" y="130" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6B6760">後に提出</text>
  <text x="715" y="150" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4338CA">所要: 1分/件</text>

  <!-- Bottom comparison -->
  <rect x="80" y="200" width="280" height="80" rx="10" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="220" y="225" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="13" fill="#991B1B">テンプレなしの場合</text>
  <text x="220" y="250" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#7F1D1D">1件あたり 15〜30分</text>
  <text x="220" y="268" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6B6760">120件 = 30〜60時間</text>
  
  <rect x="440" y="200" width="280" height="80" rx="10" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <text x="580" y="225" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="13" fill="#166534">テンプレ活用の場合</text>
  <text x="580" y="250" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#166534">1件あたり 5〜7分</text>
  <text x="580" y="268" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6B6760">120件 = 10〜14時間</text>

  <!-- Arrow between -->
  <polygon points="370,240 420,230 420,235 430,240 420,245 420,250" fill="#1B4F3A"/>
  <text x="400" y="228" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="11" fill="#1B4F3A">3倍速</text>

  <!-- Footer -->
  <text x="400" y="308" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#C8C4BC">© 内科ナビ naikanavi.com</text>
</svg>
