<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" fill="none">
  <rect width="800" height="320" rx="16" fill="#F5F4F0"/>
  
  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="18" font-weight="700" fill="#1A1917">症例登録を効率化する5つのテクニック</text>
  
  <!-- Row 1 -->
  <!-- Technique 1 -->
  <rect x="30" y="60" width="240" height="105" rx="10" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1.5"/>
  <circle cx="60" cy="90" r="16" fill="#1B4F3A"/>
  <text x="60" y="96" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="white">1</text>
  <text x="85" y="88" font-family="'Noto Sans JP', sans-serif" font-size="13" font-weight="700" fill="#1A1917">退院当日に登録</text>
  <text x="85" y="104" font-family="'Noto Sans JP', sans-serif" font-size="11" fill="#6B6760">記憶が鮮明 → 5分で完了</text>
  <rect x="45" y="120" width="210" height="34" rx="6" fill="#E8F0EC"/>
  <text x="150" y="138" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="10" fill="#1B4F3A">退院サマリー → そのままJ-OSLER</text>
  <text x="150" y="150" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="10" fill="#1B4F3A">この動線を習慣化する</text>
  
  <!-- Technique 2 -->
  <rect x="280" y="60" width="240" height="105" rx="10" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1.5"/>
  <circle cx="310" cy="90" r="16" fill="#1B4F3A"/>
  <text x="310" y="96" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="white">2</text>
  <text x="335" y="88" font-family="'Noto Sans JP', sans-serif" font-size="13" font-weight="700" fill="#1A1917">疾患群を管理</text>
  <text x="335" y="104" font-family="'Noto Sans JP', sans-serif" font-size="11" fill="#6B6760">56群のカバー状況を可視化</text>
  <rect x="295" y="120" width="210" height="34" rx="6" fill="#E8F0EC"/>
  <text x="400" y="138" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="10" fill="#1B4F3A">Excelか内科ナビの</text>
  <text x="400" y="150" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="10" fill="#1B4F3A">ダッシュボードで自動集計</text>
  
  <!-- Technique 3 -->
  <rect x="530" y="60" width="240" height="105" rx="10" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1.5"/>
  <circle cx="560" cy="90" r="16" fill="#1B4F3A"/>
  <text x="560" y="96" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="white">3</text>
  <text x="585" y="88" font-family="'Noto Sans JP', sans-serif" font-size="13" font-weight="700" fill="#1A1917">テンプレ活用</text>
  <text x="585" y="104" font-family="'Noto Sans JP', sans-serif" font-size="11" fill="#6B6760">診療科別パターンを用意</text>
  <rect x="545" y="120" width="210" height="34" rx="6" fill="#E8F0EC"/>
  <text x="650" y="138" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="10" fill="#1B4F3A">穴埋め式で入力速度を</text>
  <text x="650" y="150" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="10" fill="#1B4F3A">大幅にアップ</text>
  
  <!-- Row 2 -->
  <!-- Technique 4 -->
  <rect x="155" y="180" width="240" height="105" rx="10" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1.5"/>
  <circle cx="185" cy="210" r="16" fill="#1B4F3A"/>
  <text x="185" y="216" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="white">4</text>
  <text x="210" y="208" font-family="'Noto Sans JP', sans-serif" font-size="13" font-weight="700" fill="#1A1917">バッチ処理</text>
  <text x="210" y="224" font-family="'Noto Sans JP', sans-serif" font-size="11" fill="#6B6760">週1回30分でまとめ登録</text>
  <rect x="170" y="240" width="210" height="34" rx="6" fill="#E8F0EC"/>
  <text x="275" y="258" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="10" fill="#1B4F3A">溜まった症例を一気に消化</text>
  <text x="275" y="270" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="10" fill="#1B4F3A">1件5分 × 6件 = 30分</text>
  
  <!-- Technique 5 -->
  <rect x="405" y="180" width="240" height="105" rx="10" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1.5"/>
  <circle cx="435" cy="210" r="16" fill="#1B4F3A"/>
  <text x="435" y="216" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="white">5</text>
  <text x="460" y="208" font-family="'Noto Sans JP', sans-serif" font-size="13" font-weight="700" fill="#1A1917">初期研修症例も活用</text>
  <text x="460" y="224" font-family="'Noto Sans JP', sans-serif" font-size="11" fill="#6B6760">3条件を満たせば登録可能</text>
  <rect x="420" y="240" width="210" height="34" rx="6" fill="#E8F0EC"/>
  <text x="525" y="258" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="10" fill="#1B4F3A">不足疾患群を初期研修の</text>
  <text x="525" y="270" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="10" fill="#1B4F3A">経験症例で補完する</text>
  
  <!-- Footer -->
  <text x="400" y="310" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="10" fill="#C8C4BC">© 内科ナビ naikanavi.com</text>
</svg>
