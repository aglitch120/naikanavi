<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="'Noto Sans JP', 'Hiragino Sans', sans-serif">
  <defs>
    <filter id="shadow1" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="800" height="340" rx="16" fill="#F5F4F0"/>
  <text x="400" y="40" text-anchor="middle" font-size="18" font-weight="bold" fill="#1A1917">Wordで下書きする3つのメリット</text>
  <g transform="translate(30,65)">
