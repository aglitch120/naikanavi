<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="'Noto Sans JP', 'Hiragino Sans', sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1A1917" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#1B4F3A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" rx="16" fill="#F5F4F0"/>

  <!-- Header -->
  <rect x="24" y="20" width="752" height="56" rx="12" fill="url(#headerGrad)"/>
  <text x="400" y="55" text-anchor="middle" fill="#FEFEFC" font-size="22" font-weight="700">J-OSLER ログインできないときの対処フロー</text>

  <!-- Start -->
  <rect x="280" y="96" width="240" height="44" rx="22" fill="#1B4F3A" stroke="none"/>
  <text x="400" y="124" text-anchor="middle" fill="#FEFEFC" font-size="15" font-weight="600">ログインできない</text>

  <!-- Arrow 1 -->
  <line x1="400" y1="140" x2="400" y2="170" stroke="#6B6760" stroke-width="2" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#6B6760"/></marker></defs>

  <!-- Decision 1: パスワード間違い？ -->
  <rect x="240" y="170" width="320" height="48" rx="12" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="199" text-anchor="middle" fill="#1A1917" font-size="14" font-weight="600">パスワードを5回間違えた？</text>

  <!-- Yes branch -->
  <line x1="560" y1="194" x2="640" y2="194" stroke="#6B6760" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="590" y="188" fill="#991B1B" font-size="12" font-weight="600">Yes</text>
  <rect x="640" y="174" width="140" height="40" rx="10" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1.5"/>
  <text x="710" y="198" text-anchor="middle" fill="#991B1B" font-size="12" font-weight="600">60分待ってから</text>
  <text x="710" y="212" text-anchor="middle" fill="#991B1B" font-size="11">再ログイン</text>

  <!-- No branch -->
  <line x1="400" y1="218" x2="400" y2="250" stroke="#6B6760" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="412" y="238" fill="#166534" font-size="12" font-weight="600">No</text>

  <!-- Decision 2: パスワード忘れ？ -->
  <rect x="240" y="250" width="320" height="48" rx="12" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="279" text-anchor="middle" fill="#1A1917" font-size="14" font-weight="600">パスワードを忘れた？</text>

  <!-- Yes branch -->
  <line x1="560" y1="274" x2="640" y2="274" stroke="#6B6760" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="590" y="268" fill="#991B1B" font-size="12" font-weight="600">Yes</text>
  <rect x="640" y="254" width="140" height="40" rx="10" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="710" y="278" text-anchor="middle" fill="#92400E" font-size="12" font-weight="600">パスワード</text>
  <text x="710" y="292" text-anchor="middle" fill="#92400E" font-size="11">リセット申請</text>

  <!-- No branch -->
  <line x1="400" y1="298" x2="400" y2="330" stroke="#6B6760" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="412" y="318" fill="#166534" font-size="12" font-weight="600">No</text>

  <!-- Decision 3: ブラウザの問題？ -->
  <rect x="240" y="330" width="320" height="48" rx="12" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="359" text-anchor="middle" fill="#1A1917" font-size="14" font-weight="600">ブラウザ / キャッシュの問題？</text>

  <!-- Yes branch -->
  <line x1="560" y1="354" x2="640" y2="354" stroke="#6B6760" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="590" y="348" fill="#991B1B" font-size="12" font-weight="600">Yes</text>
  <rect x="640" y="334" width="140" height="40" rx="10" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="710" y="358" text-anchor="middle" fill="#166534" font-size="12" font-weight="600">キャッシュクリア</text>
  <text x="710" y="372" text-anchor="middle" fill="#166534" font-size="11">+ 推奨ブラウザ</text>

  <!-- No branch -->
  <line x1="400" y1="378" x2="400" y2="410" stroke="#6B6760" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="412" y="398" fill="#166534" font-size="12" font-weight="600">No</text>

  <!-- Decision 4: メンテナンス？ -->
  <rect x="240" y="410" width="320" height="48" rx="12" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="439" text-anchor="middle" fill="#1A1917" font-size="14" font-weight="600">システムメンテナンス中？</text>

  <!-- Yes branch -->
  <line x1="560" y1="434" x2="640" y2="434" stroke="#6B6760" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="590" y="428" fill="#991B1B" font-size="12" font-weight="600">Yes</text>
  <rect x="640" y="414" width="140" height="40" rx="10" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="710" y="438" text-anchor="middle" fill="#92400E" font-size="12" font-weight="600">終了まで待機</text>

  <!-- No branch -->
  <line x1="400" y1="458" x2="400" y2="490" stroke="#6B6760" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="412" y="478" fill="#166534" font-size="12" font-weight="600">No</text>

  <!-- Final: 問い合わせ -->
  <rect x="260" y="490" width="280" height="52" rx="12" fill="#E8F0EC" stroke="#1B4F3A" stroke-width="2"/>
  <text x="400" y="515" text-anchor="middle" fill="#1B4F3A" font-size="14" font-weight="700">内科学会事務局へ問い合わせ</text>
  <text x="400" y="534" text-anchor="middle" fill="#6B6760" font-size="11">jmecc-info@naika.or.jp</text>

  <!-- Left side tips -->
  <rect x="24" y="450" width="200" height="130" rx="12" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="124" y="475" text-anchor="middle" fill="#1B4F3A" font-size="13" font-weight="700">💡 予防策</text>
  <text x="36" y="498" fill="#1A1917" font-size="11">✓ パスワード管理アプリ活用</text>
  <text x="36" y="518" fill="#1A1917" font-size="11">✓ 推奨ブラウザで利用</text>
  <text x="36" y="538" fill="#1A1917" font-size="11">✓ メンテナンス情報を確認</text>
  <text x="36" y="558" fill="#1A1917" font-size="11">✓ 夜間・早朝は避ける</text>
</svg>