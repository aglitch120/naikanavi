<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Noto Sans JP', 'Hiragino Sans', sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1A1917" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3D5A80"/>
      <stop offset="100%" stop-color="#1E3A5F"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" rx="16" fill="#F5F4F0"/>

  <!-- Header -->
  <rect x="24" y="20" width="752" height="52" rx="12" fill="url(#headerGrad)"/>
  <text x="400" y="53" text-anchor="middle" fill="#FEFEFC" font-size="20" font-weight="700">160症例を効率的に集める5つの戦略</text>

  <!-- Strategy 1 -->
  <rect x="24" y="92" width="366" height="120" rx="12" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="60" cy="128" r="20" fill="#1E3A5F"/>
  <text x="60" y="134" text-anchor="middle" fill="#FEFEFC" font-size="16" font-weight="700">1</text>
  <text x="92" y="122" fill="#1A1917" font-size="14" font-weight="700">当日中に登録する</text>
  <text x="92" y="144" fill="#6B6760" font-size="11">退院日にすぐ登録。記憶が新鮮な</text>
  <text x="92" y="162" fill="#6B6760" font-size="11">うちに入力すれば所要時間は5分。</text>
  <rect x="92" y="176" width="120" height="22" rx="6" fill="#E8F0EC"/>
  <text x="152" y="191" text-anchor="middle" fill="#1B4F3A" font-size="10" font-weight="700">効果：溜めない習慣</text>

  <!-- Strategy 2 -->
  <rect x="410" y="92" width="366" height="120" rx="12" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="446" cy="128" r="20" fill="#1B4F3A"/>
  <text x="446" y="134" text-anchor="middle" fill="#FEFEFC" font-size="16" font-weight="700">2</text>
  <text x="478" y="122" fill="#1A1917" font-size="14" font-weight="700">疾患群マップを作る</text>
  <text x="478" y="144" fill="#6B6760" font-size="11">56疾患群の一覧表を作り、登録済み</text>
  <text x="478" y="162" fill="#6B6760" font-size="11">をチェック。不足を常に把握する。</text>
  <rect x="478" y="176" width="120" height="22" rx="6" fill="#E8F0EC"/>
  <text x="538" y="191" text-anchor="middle" fill="#1B4F3A" font-size="10" font-weight="700">効果：抜け漏れ防止</text>

  <!-- Strategy 3 -->
  <rect x="24" y="228" width="366" height="120" rx="12" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="60" cy="264" r="20" fill="#0D7377"/>
  <text x="60" y="270" text-anchor="middle" fill="#FEFEFC" font-size="16" font-weight="700">3</text>
  <text x="92" y="258" fill="#1A1917" font-size="14" font-weight="700">他科コンサルトを活用</text>
  <text x="92" y="280" fill="#6B6760" font-size="11">「関わった症例」は他科ローテでも</text>
  <text x="92" y="298" fill="#6B6760" font-size="11">可。救急当直の症例も忘れずに。</text>
  <rect x="92" y="312" width="140" height="22" rx="6" fill="#E8F0EC"/>
  <text x="162" y="327" text-anchor="middle" fill="#1B4F3A" font-size="10" font-weight="700">効果：レア疾患群カバー</text>

  <!-- Strategy 4 -->
  <rect x="410" y="228" width="366" height="120" rx="12" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="446" cy="264" r="20" fill="#4338CA"/>
  <text x="446" y="270" text-anchor="middle" fill="#FEFEFC" font-size="16" font-weight="700">4</text>
  <text x="478" y="258" fill="#1A1917" font-size="14" font-weight="700">テンプレを用意する</text>
  <text x="478" y="280" fill="#6B6760" font-size="11">現病歴・自己省察の定型文を作り、</text>
  <text x="478" y="298" fill="#6B6760" font-size="11">入力時間を大幅に短縮する。</text>
  <rect x="478" y="312" width="140" height="22" rx="6" fill="#EDEBF6"/>
  <text x="548" y="327" text-anchor="middle" fill="#4338CA" font-size="10" font-weight="700">効果：1件あたり5分</text>

  <!-- Strategy 5 -->
  <rect x="170" y="364" width="460" height="120" rx="12" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="206" cy="400" r="20" fill="#B8860B"/>
  <text x="206" y="406" text-anchor="middle" fill="#FEFEFC" font-size="16" font-weight="700">5</text>
  <text x="238" y="394" fill="#1A1917" font-size="14" font-weight="700">月次で進捗レビューする</text>
  <text x="238" y="416" fill="#6B6760" font-size="11">毎月末にモニタリング画面を確認し、ペースの遅れを早期発見。</text>
  <text x="238" y="436" fill="#6B6760" font-size="11">不足疾患群は翌月の当直・外来で意識的に拾う。</text>
  <rect x="238" y="450" width="160" height="22" rx="6" fill="#FFF3E0"/>
  <text x="318" y="465" text-anchor="middle" fill="#B8860B" font-size="10" font-weight="700">効果：3年目に焦らない</text>

  <!-- Footer -->
  <text x="776" y="512" text-anchor="end" fill="#A9A49E" font-size="10">© 内科ナビ naikanavi.com</text>
</svg>
