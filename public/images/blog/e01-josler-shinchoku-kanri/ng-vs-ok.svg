<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Noto Sans JP', sans-serif">
  <rect width="800" height="400" fill="#F5F4F0"/>

  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1A1917">進捗管理のNG例 vs OK例</text>

  <!-- NG側 -->
  <rect x="30" y="55" width="360" height="300" rx="12" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="2"/>
  <rect x="30" y="55" width="360" height="34" rx="12" fill="#991B1B"/>
  <text x="210" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#FEFEFC">NG: なんとなく進める</text>

  <text x="55" y="112" font-size="12" fill="#991B1B" font-weight="bold">1年目</text>
  <text x="55" y="130" font-size="12" fill="#1A1917">「まだ時間あるし...」で後回し</text>
  <text x="55" y="148" font-size="11" fill="#6B6760">→ 症例登録20件、病歴要約0件</text>

  <text x="55" y="176" font-size="12" fill="#991B1B" font-weight="bold">2年目</text>
  <text x="55" y="194" font-size="12" fill="#1A1917">症例登録を優先して病歴要約が後回し</text>
  <text x="55" y="212" font-size="11" fill="#6B6760">→ 症例100件、病歴要約5件</text>

  <text x="55" y="240" font-size="12" fill="#991B1B" font-weight="bold">3年目</text>
  <text x="55" y="258" font-size="12" fill="#1A1917">病歴要約24件が未完了で一次評価に</text>
  <text x="55" y="276" font-size="12" fill="#1A1917">間に合わない</text>
  <text x="55" y="296" font-size="11" fill="#6B6760">→ 差し戻しの修正も重なり破綻</text>

  <rect x="55" y="310" width="310" height="30" rx="6" fill="#991B1B"/>
  <text x="210" y="330" text-anchor="middle" font-size="13" font-weight="bold" fill="#FEFEFC">結果: 留年（受験1年遅れ）</text>

  <!-- OK側 -->
  <rect x="410" y="55" width="360" height="300" rx="12" fill="#DCFCE7" stroke="#86EFAC" stroke-width="2"/>
  <rect x="410" y="55" width="360" height="34" rx="12" fill="#166534"/>
  <text x="590" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#FEFEFC">OK: 計画的に可視化する</text>

  <text x="435" y="112" font-size="12" fill="#166534" font-weight="bold">1年目</text>
  <text x="435" y="130" font-size="12" fill="#1A1917">月5件ペースで症例登録を開始</text>
  <text x="435" y="148" font-size="11" fill="#6B6760">→ 症例60件、病歴要約10件（個別評価中）</text>

  <text x="435" y="176" font-size="12" fill="#166534" font-weight="bold">2年目</text>
  <text x="435" y="194" font-size="12" fill="#1A1917">疾患群の不足を可視化して集中対応</text>
  <text x="435" y="212" font-size="11" fill="#6B6760">→ 症例120件完了、病歴要約29件完了</text>

  <text x="435" y="240" font-size="12" fill="#166534" font-weight="bold">3年目</text>
  <text x="435" y="258" font-size="12" fill="#1A1917">一次評価に余裕を持って臨む</text>
  <text x="435" y="276" font-size="12" fill="#1A1917">差し戻し修正にも対応可能</text>
  <text x="435" y="296" font-size="11" fill="#6B6760">→ 二次評価もスムーズに通過</text>

  <rect x="435" y="310" width="310" height="30" rx="6" fill="#166534"/>
  <text x="590" y="330" text-anchor="middle" font-size="13" font-weight="bold" fill="#FEFEFC">結果: 最短で内科専門医取得</text>

  <!-- VS -->
  <circle cx="400" cy="205" r="20" fill="#1A1917"/>
  <text x="400" y="210" text-anchor="middle" font-size="12" font-weight="bold" fill="#FEFEFC">VS</text>

  <!-- footer -->
  <text x="400" y="388" text-anchor="middle" font-size="10" fill="#6B6760">© 内科ナビ naikanavi.com</text>
</svg>