<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow2" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1A1917" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="380" rx="16" fill="#F5F4F0"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1B4F3A">書きやすい症例の5条件</text>

  <!-- Condition cards - row 1 (3 cards) -->
  <!-- Card 1 -->
  <rect x="30" y="56" width="235" height="140" rx="12" fill="#FEFEFC" filter="url(#shadow2)"/>
  <circle cx="68" cy="94" r="22" fill="#E8F0EC"/>
  <text x="68" y="100" text-anchor="middle" font-size="18" font-weight="700" fill="#1B4F3A">1</text>
  <text x="100" y="90" font-size="13" font-weight="700" fill="#1A1917">診断が確定</text>
  <text x="100" y="108" font-size="11" fill="#6B6760">している</text>
  <text x="48" y="136" font-size="11" fill="#6B6760">病理・画像で確定診断あり</text>
  <text x="48" y="154" font-size="11" fill="#6B6760">「〜疑い」は避ける</text>
  <text x="48" y="176" font-size="10" fill="#1B4F3A" font-weight="600">→ 考察の軸が定まる</text>

  <!-- Card 2 -->
  <rect x="283" y="56" width="235" height="140" rx="12" fill="#FEFEFC" filter="url(#shadow2)"/>
  <circle cx="321" cy="94" r="22" fill="#E8F0EC"/>
  <text x="321" y="100" text-anchor="middle" font-size="18" font-weight="700" fill="#1B4F3A">2</text>
  <text x="353" y="90" font-size="13" font-weight="700" fill="#1A1917">入院期間が</text>
  <text x="353" y="108" font-size="11" fill="#6B6760">適切（7〜21日）</text>
  <text x="301" y="136" font-size="11" fill="#6B6760">短すぎ→内容不足</text>
  <text x="301" y="154" font-size="11" fill="#6B6760">長すぎ→A4 2枚に収まらない</text>
  <text x="301" y="176" font-size="10" fill="#1B4F3A" font-weight="600">→ 1〜3週間がベスト</text>

  <!-- Card 3 -->
  <rect x="536" y="56" width="235" height="140" rx="12" fill="#FEFEFC" filter="url(#shadow2)"/>
  <circle cx="574" cy="94" r="22" fill="#E8F0EC"/>
  <text x="574" y="100" text-anchor="middle" font-size="18" font-weight="700" fill="#1B4F3A">3</text>
  <text x="606" y="90" font-size="13" font-weight="700" fill="#1A1917">全人的要素が</text>
  <text x="606" y="108" font-size="11" fill="#6B6760">明確にある</text>
  <text x="554" y="136" font-size="11" fill="#6B6760">独居高齢者・就労中の患者</text>
  <text x="554" y="154" font-size="11" fill="#6B6760">妊婦・外国人患者 など</text>
  <text x="554" y="176" font-size="10" fill="#1B4F3A" font-weight="600">→ 全人的考察が書きやすい</text>

  <!-- Condition cards - row 2 (2 cards centered) -->
  <!-- Card 4 -->
  <rect x="155" y="214" width="235" height="140" rx="12" fill="#FEFEFC" filter="url(#shadow2)"/>
  <circle cx="193" cy="252" r="22" fill="#E8F0EC"/>
  <text x="193" y="258" text-anchor="middle" font-size="18" font-weight="700" fill="#1B4F3A">4</text>
  <text x="225" y="248" font-size="13" font-weight="700" fill="#1A1917">文献が</text>
  <text x="225" y="266" font-size="11" fill="#6B6760">見つかりやすい</text>
  <text x="173" y="294" font-size="11" fill="#6B6760">ガイドラインが存在する疾患</text>
  <text x="173" y="312" font-size="11" fill="#6B6760">UpToDateに項目がある疾患</text>
  <text x="173" y="334" font-size="10" fill="#1B4F3A" font-weight="600">→ 引用文献に困らない</text>

  <!-- Card 5 -->
  <rect x="410" y="214" width="235" height="140" rx="12" fill="#FEFEFC" filter="url(#shadow2)"/>
  <circle cx="448" cy="252" r="22" fill="#E8F0EC"/>
  <text x="448" y="258" text-anchor="middle" font-size="18" font-weight="700" fill="#1B4F3A">5</text>
  <text x="480" y="248" font-size="13" font-weight="700" fill="#1A1917">自分が</text>
  <text x="480" y="266" font-size="11" fill="#6B6760">主担当だった</text>
  <text x="428" y="294" font-size="11" fill="#6B6760">入院〜退院まで一貫して担当</text>
  <text x="428" y="312" font-size="11" fill="#6B6760">経過・判断の詳細を把握</text>
  <text x="428" y="334" font-size="10" fill="#1B4F3A" font-weight="600">→ 執筆速度が格段にUP</text>

  <text x="790" y="375" text-anchor="end" font-size="9" fill="#C8C4BC">© 内科ナビ naikanavi.com</text>
</svg>
