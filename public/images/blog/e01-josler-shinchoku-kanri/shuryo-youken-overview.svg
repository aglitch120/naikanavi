<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="'Noto Sans JP', sans-serif">
  <rect width="800" height="480" fill="#F5F4F0"/>

  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1A1917">J-OSLER 修了要件の全体像</text>

  <!-- 症例登録 -->
  <rect x="40" y="60" width="220" height="160" rx="12" fill="#FEFEFC" stroke="#1B4F3A" stroke-width="2"/>
  <rect x="40" y="60" width="220" height="36" rx="12" fill="#1B4F3A"/>
  <text x="150" y="84" text-anchor="middle" font-size="14" font-weight="bold" fill="#FEFEFC">症例登録</text>
  <text x="150" y="112" text-anchor="middle" font-size="13" fill="#1A1917">120症例以上</text>
  <text x="150" y="132" text-anchor="middle" font-size="12" fill="#6B6760">（6期生以前は160症例）</text>
  <text x="150" y="158" text-anchor="middle" font-size="13" fill="#1A1917">56疾患群以上を網羅</text>
  <text x="150" y="180" text-anchor="middle" font-size="13" fill="#1A1917">指導医1名の承認</text>
  <text x="150" y="204" text-anchor="middle" font-size="12" fill="#1B4F3A" font-weight="bold">質より量とスピード</text>

  <!-- 病歴要約 -->
  <rect x="290" y="60" width="220" height="160" rx="12" fill="#FEFEFC" stroke="#1B4F3A" stroke-width="2"/>
  <rect x="290" y="60" width="220" height="36" rx="12" fill="#1B4F3A"/>
  <text x="400" y="84" text-anchor="middle" font-size="14" font-weight="bold" fill="#FEFEFC">病歴要約</text>
  <text x="400" y="112" text-anchor="middle" font-size="13" fill="#1A1917">29症例を作成</text>
  <text x="400" y="132" text-anchor="middle" font-size="12" fill="#6B6760">（全て異なる疾患群から）</text>
  <text x="400" y="158" text-anchor="middle" font-size="13" fill="#1A1917">個別評価 → 一次評価</text>
  <text x="400" y="178" text-anchor="middle" font-size="13" fill="#1A1917">→ 二次評価の3段階</text>
  <text x="400" y="204" text-anchor="middle" font-size="12" fill="#991B1B" font-weight="bold">最大の難関・最優先</text>

  <!-- その他要件 -->
  <rect x="540" y="60" width="220" height="160" rx="12" fill="#FEFEFC" stroke="#1B4F3A" stroke-width="2"/>
  <rect x="540" y="60" width="220" height="36" rx="12" fill="#1B4F3A"/>
  <text x="650" y="84" text-anchor="middle" font-size="14" font-weight="bold" fill="#FEFEFC">その他の要件</text>
  <text x="650" y="112" text-anchor="middle" font-size="13" fill="#1A1917">JMECC受講</text>
  <text x="650" y="134" text-anchor="middle" font-size="13" fill="#1A1917">学会参加 年2回x3年</text>
  <text x="650" y="156" text-anchor="middle" font-size="13" fill="#1A1917">学会発表/論文 2件以上</text>
  <text x="650" y="178" text-anchor="middle" font-size="13" fill="#1A1917">講習会 年2回x3年</text>
  <text x="650" y="204" text-anchor="middle" font-size="12" fill="#92400E" font-weight="bold">見落とし注意</text>

  <!-- 矢印 -->
  <path d="M150 225 L150 260 L400 260 L400 280" stroke="#1B4F3A" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M400 225 L400 280" stroke="#1B4F3A" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M650 225 L650 260 L400 260 L400 280" stroke="#1B4F3A" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1B4F3A"/>
    </marker>
  </defs>

  <!-- 修了認定 -->
  <rect x="200" y="285" width="400" height="50" rx="12" fill="#E8F0EC" stroke="#1B4F3A" stroke-width="2"/>
  <text x="400" y="316" text-anchor="middle" font-size="15" font-weight="bold" fill="#1B4F3A">修了認定（プログラム統括責任者の承認）</text>

  <!-- 内科専門医試験 -->
  <path d="M400 340 L400 365" stroke="#1B4F3A" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <rect x="240" y="370" width="320" height="50" rx="12" fill="#1B4F3A"/>
  <text x="400" y="401" text-anchor="middle" font-size="15" font-weight="bold" fill="#FEFEFC">内科専門医試験の受験</text>

  <!-- 修了見込note -->
  <rect x="580" y="290" width="190" height="76" rx="8" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <text x="675" y="310" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400E">修了見込で先に受験も可</text>
  <text x="675" y="326" text-anchor="middle" font-size="10" fill="#92400E">120症例承認完了</text>
  <text x="675" y="340" text-anchor="middle" font-size="10" fill="#92400E">+29病歴要約の個別承認</text>
  <text x="675" y="354" text-anchor="middle" font-size="10" fill="#92400E">で申請可能（3年目1〜3月）</text>

  <!-- footer -->
  <text x="400" y="468" text-anchor="middle" font-size="10" fill="#6B6760">© 内科ナビ naikanavi.com</text>
</svg>