  <text x="145" y="244" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="9" font-weight="600" fill="#1B4F3A">使用頻度 ★★★★★</text>
  
  <!-- Pattern 2 -->
  <rect x="283" y="60" width="235" height="200" rx="12" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1.5"/>
  <circle cx="400" cy="100" r="22" fill="#FEF3C7"/>
  <text x="400" y="106" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="20">🔄</text>
  <text x="400" y="140" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="#92400E">改善・反省型</text>
  <text x="400" y="165" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="11" fill="#6B6760">改善点や反省を記述</text>
