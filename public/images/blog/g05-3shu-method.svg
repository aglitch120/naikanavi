<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Helvetica Neue', Arial, sans-serif">
  <rect width="800" height="500" fill="#F5F4F0" rx="12"/>
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1A1917">過去問の効果的な解き方 3周メソッド</text>
  <line x1="60" y1="52" x2="740" y2="52" stroke="#DDD9D2" stroke-width="1"/>
  <rect x="40" y="70" width="230" height="300" rx="10" fill="#FEFEFC" stroke="#1B4F3A" stroke-width="2"/>
  <rect x="40" y="70" width="230" height="40" rx="10" fill="#1B4F3A"/>
  <rect x="40" y="92" width="230" height="18" fill="#1B4F3A"/>
  <text x="100" y="96" font-size="15" font-weight="bold" fill="#FEFEFC">1周目: 全体把握</text>
  <text x="60" y="132" font-size="12" fill="#1A1917" font-weight="bold">目的</text>
  <text x="60" y="150" font-size="11" fill="#6B6760">出題範囲と難易度を体感する</text>
  <text x="60" y="174" font-size="12" fill="#1A1917" font-weight="bold">やり方</text>
  <text x="60" y="192" font-size="11" fill="#6B6760">1問2〜3分ペースで高速で解く</text>
  <text x="60" y="208" font-size="11" fill="#6B6760">わからない問題は飛ばしてOK</text>
  <text x="60" y="224" font-size="11" fill="#6B6760">正答/誤答を記録する</text>
  <text x="60" y="248" font-size="12" fill="#1A1917" font-weight="bold">ポイント</text>
  <text x="60" y="266" font-size="11" fill="#1B4F3A">分野別の正答率を記録し</text>
  <text x="60" y="282" font-size="11" fill="#1B4F3A">苦手分野を特定する</text>
  <rect x="60" y="298" width="190" height="30" rx="6" fill="#E8F0EC"/>
  <text x="155" y="318" text-anchor="middle" font-size="11" fill="#1B4F3A">所要時間: 1〜2週間</text>
  <rect x="60" y="338" width="190" height="24" rx="6" fill="#FEF3C7"/>
  <text x="155" y="354" text-anchor="middle" font-size="11" fill="#92400E">正答率の目安: 50〜60%でOK</text>
  <path d="M270 220 L285 220" stroke="#1B4F3A" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#1B4F3A"/>
    </marker>
  </defs>
  <rect x="285" y="70" width="230" height="300" rx="10" fill="#FEFEFC" stroke="#2D6A4F" stroke-width="2"/>
  <rect x="285" y="70" width="230" height="40" rx="10" fill="#2D6A4F"/>
  <rect x="285" y="92" width="230" height="18" fill="#2D6A4F"/>
  <text x="345" y="96" font-size="15" font-weight="bold" fill="#FEFEFC">2周目: 弱点補強</text>
  <text x="305" y="132" font-size="12" fill="#1A1917" font-weight="bold">目的</text>
  <text x="305" y="150" font-size="11" fill="#6B6760">苦手分野を重点的に潰す</text>
  <text x="305" y="174" font-size="12" fill="#1A1917" font-weight="bold">やり方</text>
  <text x="305" y="192" font-size="11" fill="#6B6760">1周目で間違えた問題を中心に解く</text>
  <text x="305" y="208" font-size="11" fill="#6B6760">イヤーノートで周辺知識を調べる</text>
  <text x="305" y="224" font-size="11" fill="#6B6760">「なぜ間違えたか」をメモする</text>
  <text x="305" y="248" font-size="12" fill="#1A1917" font-weight="bold">ポイント</text>
  <text x="305" y="266" font-size="11" fill="#2D6A4F">選択肢の1つ1つについて</text>
  <text x="305" y="282" font-size="11" fill="#2D6A4F">正誤の理由を説明できるように</text>
  <rect x="305" y="298" width="190" height="30" rx="6" fill="#E8F0EC"/>
  <text x="400" y="318" text-anchor="middle" font-size="11" fill="#1B4F3A">所要時間: 2〜3週間</text>
  <rect x="305" y="338" width="190" height="24" rx="6" fill="#FEF3C7"/>
  <text x="400" y="354" text-anchor="middle" font-size="11" fill="#92400E">正答率の目安: 70〜80%</text>
  <path d="M515 220 L530 220" stroke="#1B4F3A" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <rect x="530" y="70" width="230" height="300" rx="10" fill="#FEFEFC" stroke="#3D5A80" stroke-width="2"/>
  <rect x="530" y="70" width="230" height="40" rx="10" fill="#3D5A80"/>
  <rect x="530" y="92" width="230" height="18" fill="#3D5A80"/>
  <text x="590" y="96" font-size="15" font-weight="bold" fill="#FEFEFC">3周目: 総仕上げ</text>
  <text x="550" y="132" font-size="12" fill="#1A1917" font-weight="bold">目的</text>
  <text x="550" y="150" font-size="11" fill="#6B6760">取りこぼしをゼロに近づける</text>
  <text x="550" y="174" font-size="12" fill="#1A1917" font-weight="bold">やり方</text>
  <text x="550" y="192" font-size="11" fill="#6B6760">2周目でも間違えた問題のみ解く</text>
  <text x="550" y="208" font-size="11" fill="#6B6760">時間を計って本番形式で解く</text>
  <text x="550" y="224" font-size="11" fill="#6B6760">残り間違いを最終チェック</text>
  <text x="550" y="248" font-size="12" fill="#1A1917" font-weight="bold">ポイント</text>
  <text x="550" y="266" font-size="11" fill="#3D5A80">「みんなが解ける問題を</text>
  <text x="550" y="282" font-size="11" fill="#3D5A80">落とさない」ことが合格の鍵</text>
  <rect x="550" y="298" width="190" height="30" rx="6" fill="#E8F0EC"/>
  <text x="645" y="318" text-anchor="middle" font-size="11" fill="#1B4F3A">所要時間: 1週間</text>
  <rect x="550" y="338" width="190" height="24" rx="6" fill="#FEF3C7"/>
  <text x="645" y="354" text-anchor="middle" font-size="11" fill="#92400E">正答率の目安: 85%以上</text>
  <rect x="40" y="390" width="720" height="80" rx="10" fill="#FEE2E2" stroke="#991B1B" stroke-width="1.5"/>
  <text x="60" y="416" font-size="13" font-weight="bold" fill="#991B1B">よくある失敗パターン</text>
  <text x="60" y="438" font-size="12" fill="#1A1917">1周だけ解いて「やった気」になる / 間違えた問題を復習しない / 新しい教材に次々手を出す</text>
  <text x="60" y="458" font-size="12" fill="#991B1B">合格者の共通点: 同じ問題集を繰り返し解き、間違えた問題を徹底的に潰している</text>
  <text x="400" y="492" text-anchor="middle" font-size="10" fill="#6B6760">© 内科ナビ naikanavi.com</text>
</svg>