<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="'Noto Sans JP', 'Hiragino Sans', sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1A1917" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" rx="16" fill="#F5F4F0"/>

  <!-- Header -->
  <rect x="24" y="16" width="752" height="44" rx="12" fill="#1B4F3A"/>
  <text x="400" y="44" text-anchor="middle" fill="#FEFEFC" font-size="17" font-weight="700">3年間の理想スケジュール｜120症例+29病歴要約</text>

  <!-- Year 1 -->
  <rect x="24" y="76" width="240" height="300" rx="12" fill="#FEFEFC" stroke="#3D5A80" stroke-width="2" filter="url(#shadow)"/>
  <rect x="24" y="76" width="240" height="40" rx="12" fill="#3D5A80"/>
  <rect x="24" y="100" width="240" height="16" fill="#3D5A80"/>
  <text x="144" y="102" text-anchor="middle" fill="#FEFEFC" font-size="15" font-weight="700">1年目（専攻医1年目）</text>

  <text x="40" y="140" fill="#3D5A80" font-size="13" font-weight="700">症例登録</text>
  <text x="40" y="160" fill="#1A1917" font-size="11">目標：60〜70症例</text>
  <text x="40" y="177" fill="#6B6760" font-size="11">他科ローテで幅広い疾患群を確保</text>
  <text x="40" y="194" fill="#6B6760" font-size="11">初期研修の症例を最大60件登録</text>

  <line x1="40" y1="208" x2="248" y2="208" stroke="#DDD9D2" stroke-width="1"/>

  <text x="40" y="228" fill="#1B4F3A" font-size="13" font-weight="700">病歴要約</text>
  <text x="40" y="248" fill="#1A1917" font-size="11">目標：5〜10編の下書き</text>
  <text x="40" y="265" fill="#6B6760" font-size="11">書きやすい症例から着手</text>
  <text x="40" y="282" fill="#6B6760" font-size="11">個別評価を2〜3編提出</text>

  <line x1="40" y1="296" x2="248" y2="296" stroke="#DDD9D2" stroke-width="1"/>

  <text x="40" y="316" fill="#92400E" font-size="13" font-weight="700">注意</text>
  <text x="40" y="336" fill="#991B1B" font-size="11">領域別最低数を常にチェック</text>
  <text x="40" y="353" fill="#991B1B" font-size="11">不足領域を早期に把握する</text>

  <!-- Year 2 -->
  <rect x="280" y="76" width="240" height="300" rx="12" fill="#FEFEFC" stroke="#1B4F3A" stroke-width="2" filter="url(#shadow)"/>
  <rect x="280" y="76" width="240" height="40" rx="12" fill="#1B4F3A"/>
  <rect x="280" y="100" width="240" height="16" fill="#1B4F3A"/>
  <text x="400" y="102" text-anchor="middle" fill="#FEFEFC" font-size="15" font-weight="700">2年目（専攻医2年目）</text>

  <text x="296" y="140" fill="#3D5A80" font-size="13" font-weight="700">症例登録</text>
  <text x="296" y="160" fill="#1A1917" font-size="11">目標：120症例完了</text>
  <text x="296" y="177" fill="#6B6760" font-size="11">2年目末までに全数登録が理想</text>
  <text x="296" y="194" fill="#6B6760" font-size="11">56疾患群の充足を最優先</text>

  <line x1="296" y1="208" x2="504" y2="208" stroke="#DDD9D2" stroke-width="1"/>

  <text x="296" y="228" fill="#1B4F3A" font-size="13" font-weight="700">病歴要約</text>
  <text x="296" y="248" fill="#1A1917" font-size="11">目標：29編を全て完成</text>
  <text x="296" y="265" fill="#6B6760" font-size="11">月3〜4編ペースで進める</text>
  <text x="296" y="282" fill="#6B6760" font-size="11">個別評価を全て完了させる</text>

  <line x1="296" y1="296" x2="504" y2="296" stroke="#DDD9D2" stroke-width="1"/>

  <text x="296" y="316" fill="#92400E" font-size="13" font-weight="700">注意</text>
  <text x="296" y="336" fill="#991B1B" font-size="11">外科紹介・剖検症例を確保</text>
  <text x="296" y="353" fill="#991B1B" font-size="11">3年目に持ち越さない意識</text>

  <!-- Year 3 -->
  <rect x="536" y="76" width="240" height="300" rx="12" fill="#FEFEFC" stroke="#92400E" stroke-width="2" filter="url(#shadow)"/>
  <rect x="536" y="76" width="240" height="40" rx="12" fill="#92400E"/>
  <rect x="536" y="100" width="240" height="16" fill="#92400E"/>
  <text x="656" y="102" text-anchor="middle" fill="#FEFEFC" font-size="15" font-weight="700">3年目（専攻医3年目）</text>

  <text x="552" y="140" fill="#3D5A80" font-size="13" font-weight="700">一次評価</text>
  <text x="552" y="160" fill="#1A1917" font-size="11">春〜夏：29編を一次評価提出</text>
  <text x="552" y="177" fill="#6B6760" font-size="11">病歴指導医+統括責任者が評価</text>
  <text x="552" y="194" fill="#6B6760" font-size="11">差し戻し対応に時間を確保</text>

  <line x1="552" y1="208" x2="760" y2="208" stroke="#DDD9D2" stroke-width="1"/>

  <text x="552" y="228" fill="#1B4F3A" font-size="13" font-weight="700">二次評価</text>
  <text x="552" y="248" fill="#1A1917" font-size="11">初夏〜秋：二次評価提出</text>
  <text x="552" y="265" fill="#6B6760" font-size="11">外部査読委員による匿名評価</text>
  <text x="552" y="282" fill="#6B6760" font-size="11">全29編のAcceptで修了認定</text>

  <line x1="552" y1="296" x2="760" y2="296" stroke="#DDD9D2" stroke-width="1"/>

  <text x="552" y="316" fill="#92400E" font-size="13" font-weight="700">注意</text>
  <text x="552" y="336" fill="#991B1B" font-size="11">COVID措置なし＝修了見込受験不可</text>
  <text x="552" y="353" fill="#991B1B" font-size="11">10月末までに一次評価完了が目標</text>

  <!-- Footer -->
  <text x="776" y="410" text-anchor="end" fill="#6B6760" font-size="10">© 内科ナビ naikanavi.com</text>
</svg>