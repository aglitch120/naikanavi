  <text x="50" y="264" font-size="11" fill="#6B6760">JMECC受講 / 学会参加2回</text>

  <!-- 2年目 カード -->
  <rect x="280" y="90" width="240" height="185" rx="10" fill="#FEFEFC" stroke="#1B4F3A" stroke-width="2"/>
  <rect x="280" y="90" width="240" height="32" rx="10" fill="#1B4F3A"/>
  <text x="400" y="112" text-anchor="middle" font-size="14" font-weight="bold" fill="#FEFEFC">2年目（加速期）</text>

  <text x="300" y="142" font-size="12" fill="#1A1917" font-weight="bold">症例登録</text>
  <rect x="300" y="148" width="140" height="10" rx="4" fill="#E8E5DF"/>
  <rect x="300" y="148" width="140" height="10" rx="4" fill="#1B4F3A"/>
  <text x="450" y="158" font-size="11" fill="#6B6760">120件完了</text>

  <text x="300" y="180" font-size="12" fill="#1A1917" font-weight="bold">疾患群</text>
  <rect x="300" y="186" width="140" height="10" rx="4" fill="#E8E5DF"/>
  <rect x="300" y="186" width="140" height="10" rx="4" fill="#1B4F3A"/>
  <text x="450" y="196" font-size="11" fill="#6B6760">56群完了</text>

  <text x="300" y="218" font-size="12" fill="#1A1917" font-weight="bold">病歴要約</text>
  <rect x="300" y="224" width="140" height="10" rx="4" fill="#E8E5DF"/>
  <rect x="300" y="224" width="140" height="10" rx="4" fill="#1B4F3A"/>
  <text x="450" y="234" font-size="11" fill="#6B6760">29件完了</text>

  <text x="300" y="264" font-size="11" fill="#6B6760">個別評価29件完了が理想</text>

  <!-- 3年目 カード -->
  <rect x="530" y="90" width="240" height="185" rx="10" fill="#FEFEFC" stroke="#991B1B" stroke-width="2"/>
  <rect x="530" y="90" width="240" height="32" rx="10" fill="#991B1B"/>
  <text x="650" y="112" text-anchor="middle" font-size="14" font-weight="bold" fill="#FEFEFC">3年目（仕上げ）</text>

  <text x="550" y="142" font-size="12" fill="#1A1917" font-weight="bold">一次評価</text>
  <text x="550" y="160" font-size="11" fill="#6B6760">病歴指導医+統括責任者</text>

  <text x="550" y="184" font-size="12" fill="#1A1917" font-weight="bold">二次評価</text>
  <text x="550" y="202" font-size="11" fill="#6B6760">学会査読委員による外部評価</text>

  <text x="550" y="226" font-size="12" fill="#1A1917" font-weight="bold">修了認定</text>
  <text x="550" y="244" font-size="11" fill="#6B6760">全要件を満たしPG統括が承認</text>

  <rect x="550" y="255" width="200" height="20" rx="4" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="650" y="270" text-anchor="middle" font-size="11" font-weight="bold" fill="#991B1B">10月末: 一次評価締切</text>

  <!-- チェックポイント -->
  <rect x="40" y="300" width="720" height="145" rx="10" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1"/>
