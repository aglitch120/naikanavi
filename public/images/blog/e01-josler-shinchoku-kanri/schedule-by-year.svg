<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Noto Sans JP', sans-serif">
  <rect width="800" height="500" fill="#F5F4F0"/>

  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1A1917">J-OSLER 年次別スケジュールと目標</text>

  <!-- Timeline -->
  <line x1="80" y1="70" x2="720" y2="70" stroke="#C8C4BC" stroke-width="2"/>
  <circle cx="80" cy="70" r="6" fill="#1B4F3A"/>
  <circle cx="293" cy="70" r="6" fill="#1B4F3A"/>
  <circle cx="507" cy="70" r="6" fill="#1B4F3A"/>
  <circle cx="720" cy="70" r="6" fill="#1B4F3A"/>
  <text x="80" y="58" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B4F3A">4月</text>
  <text x="293" y="58" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B4F3A">1年目末</text>
  <text x="507" y="58" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B4F3A">2年目末</text>
  <text x="720" y="58" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B4F3A">3年目末</text>

  <!-- 1年目 カード -->
  <rect x="30" y="90" width="240" height="185" rx="10" fill="#FEFEFC" stroke="#2D6A4F" stroke-width="2"/>
  <rect x="30" y="90" width="240" height="32" rx="10" fill="#2D6A4F"/>
  <text x="150" y="112" text-anchor="middle" font-size="14" font-weight="bold" fill="#FEFEFC">1年目（土台作り）</text>

  <text x="50" y="142" font-size="12" fill="#1A1917" font-weight="bold">症例登録</text>
  <rect x="50" y="148" width="140" height="10" rx="4" fill="#E8E5DF"/>
  <rect x="50" y="148" width="70" height="10" rx="4" fill="#2D6A4F"/>
  <text x="200" y="158" font-size="11" fill="#6B6760">60件目標</text>

  <text x="50" y="180" font-size="12" fill="#1A1917" font-weight="bold">疾患群</text>
  <rect x="50" y="186" width="140" height="10" rx="4" fill="#E8E5DF"/>
  <rect x="50" y="186" width="93" height="10" rx="4" fill="#2D6A4F"/>
  <text x="200" y="196" font-size="11" fill="#6B6760">37群目標</text>

  <text x="50" y="218" font-size="12" fill="#1A1917" font-weight="bold">病歴要約</text>
  <rect x="50" y="224" width="140" height="10" rx="4" fill="#E8E5DF"/>
  <rect x="50" y="224" width="48" height="10" rx="4" fill="#2D6A4F"/>
