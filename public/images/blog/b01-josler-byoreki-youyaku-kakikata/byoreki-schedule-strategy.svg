<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="'Noto Sans JP', 'Hiragino Sans', sans-serif">
  <defs>
    <filter id="s" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1A1917" flood-opacity="0.08"/>
    </filter>
    <marker id="arw" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1B4F3A"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" rx="16" fill="#F5F4F0"/>

  <!-- Title -->
  <rect x="24" y="16" width="752" height="48" rx="12" fill="#1B4F3A"/>
  <text x="400" y="47" text-anchor="middle" fill="#FEFEFC" font-size="20" font-weight="700">病歴要約 3年間のスケジュール戦略</text>

  <!-- Timeline base -->
  <line x1="60" y1="130" x2="760" y2="130" stroke="#C8C4BC" stroke-width="3"/>
  <line x1="760" y1="130" x2="760" y2="130" stroke="#1B4F3A" stroke-width="3" marker-end="url(#arw)"/>

  <!-- Year markers -->
  <circle cx="120" cy="130" r="6" fill="#1B4F3A"/>
  <text x="120" y="115" text-anchor="middle" fill="#1B4F3A" font-size="13" font-weight="700">1年目 4月</text>

  <circle cx="340" cy="130" r="6" fill="#1B4F3A"/>
  <text x="340" y="115" text-anchor="middle" fill="#1B4F3A" font-size="13" font-weight="700">2年目 4月</text>

  <circle cx="560" cy="130" r="6" fill="#1B4F3A"/>
  <text x="560" y="115" text-anchor="middle" fill="#1B4F3A" font-size="13" font-weight="700">3年目 4月</text>

  <circle cx="730" cy="130" r="6" fill="#166534"/>
  <text x="730" y="115" text-anchor="middle" fill="#166534" font-size="13" font-weight="700">修了</text>

  <!-- Year 1 block -->
  <rect x="70" y="150" width="220" height="120" rx="12" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1.5" filter="url(#s)"/>
  <rect x="70" y="150" width="220" height="32" rx="12" fill="#E8F0EC"/>
  <rect x="70" y="170" width="220" height="12" fill="#E8F0EC"/>
  <text x="180" y="172" text-anchor="middle" fill="#1B4F3A" font-size="14" font-weight="700">1年目：土台づくり</text>

  <circle cx="90" cy="202" r="8" fill="#1B4F3A"/>
  <text x="90" y="206" text-anchor="middle" fill="#FEFEFC" font-size="10" font-weight="700">1</text>
  <text x="106" y="206" fill="#1A1917" font-size="12">症例登録を着実に進める</text>

  <circle cx="90" cy="228" r="8" fill="#1B4F3A"/>
  <text x="90" y="232" text-anchor="middle" fill="#FEFEFC" font-size="10" font-weight="700">2</text>
  <text x="106" y="232" fill="#1A1917" font-size="12">試し書き 3〜5本</text>

  <circle cx="90" cy="254" r="8" fill="#1B4F3A"/>
  <text x="90" y="258" text-anchor="middle" fill="#FEFEFC" font-size="10" font-weight="700">3</text>
  <text x="106" y="258" fill="#1A1917" font-size="12">書式の感覚をつかむ</text>

  <!-- Year 2 block -->
  <rect x="300" y="150" width="210" height="120" rx="12" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1.5" filter="url(#s)"/>
  <rect x="300" y="150" width="210" height="32" rx="12" fill="#1B4F3A"/>
  <rect x="300" y="170" width="210" height="12" fill="#1B4F3A"/>
  <text x="405" y="172" text-anchor="middle" fill="#FEFEFC" font-size="14" font-weight="700">2年目：集中執筆</text>

  <circle cx="320" cy="202" r="8" fill="#1B4F3A"/>
  <text x="320" y="206" text-anchor="middle" fill="#FEFEFC" font-size="10" font-weight="700">1</text>
  <text x="336" y="206" fill="#1A1917" font-size="12">月2〜3本ペースで執筆</text>

  <circle cx="320" cy="228" r="8" fill="#1B4F3A"/>
  <text x="320" y="232" text-anchor="middle" fill="#FEFEFC" font-size="10" font-weight="700">2</text>
  <text x="336" y="232" fill="#1A1917" font-size="12">個別評価を並行して進行</text>

  <circle cx="320" cy="254" r="8" fill="#1B4F3A"/>
  <text x="320" y="258" text-anchor="middle" fill="#FEFEFC" font-size="10" font-weight="700">3</text>
  <text x="336" y="258" fill="#1A1917" font-size="12">年度末に29本超をストック</text>

  <!-- Year 3 block -->
  <rect x="520" y="150" width="250" height="120" rx="12" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1.5" filter="url(#s)"/>
  <rect x="520" y="150" width="250" height="32" rx="12" fill="#166534"/>
  <rect x="520" y="170" width="250" height="12" fill="#166534"/>
  <text x="645" y="172" text-anchor="middle" fill="#FEFEFC" font-size="14" font-weight="700">3年目：評価クリア</text>

  <circle cx="540" cy="202" r="8" fill="#166534"/>
  <text x="540" y="206" text-anchor="middle" fill="#FEFEFC" font-size="10" font-weight="700">1</text>
  <text x="556" y="206" fill="#1A1917" font-size="12">春〜夏：一次評価を提出</text>

  <circle cx="540" cy="228" r="8" fill="#166534"/>
  <text x="540" y="232" text-anchor="middle" fill="#FEFEFC" font-size="10" font-weight="700">2</text>
  <text x="556" y="232" fill="#1A1917" font-size="12">夏〜秋：二次評価（査読委員）</text>

  <circle cx="540" cy="254" r="8" fill="#166534"/>
  <text x="540" y="258" text-anchor="middle" fill="#FEFEFC" font-size="10" font-weight="700">3</text>
  <text x="556" y="258" fill="#1A1917" font-size="12">差し戻しバッファを確保</text>

  <!-- Deadline callouts -->
  <rect x="570" y="286" width="200" height="36" rx="8" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1.5"/>
  <text x="670" y="308" text-anchor="middle" fill="#991B1B" font-size="11" font-weight="700">10月末：一次評価 締切</text>

  <rect x="570" y="328" width="200" height="36" rx="8" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1.5"/>
  <text x="670" y="350" text-anchor="middle" fill="#991B1B" font-size="11" font-weight="700">翌2月末：二次評価 締切</text>

  <!-- Tip box -->
  <rect x="30" y="375" width="743" height="32" rx="8" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="400" y="396" text-anchor="middle" fill="#166534" font-size="13" font-weight="700">💡 2年目末までに29本超ストックできれば、3年目は評価対応に集中できる</text>

  <!-- Footer -->
  <text x="780" y="416" text-anchor="end" fill="#C8C4BC" font-size="10">© 内科ナビ naikanavi.com</text>
</svg>
