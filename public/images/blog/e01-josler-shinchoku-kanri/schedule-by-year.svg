  <circle cx="70" cy="350" r="12" fill="#E8F0EC" stroke="#1B4F3A" stroke-width="1"/>
  <text x="70" y="354" text-anchor="middle" font-size="10" font-weight="bold" fill="#1B4F3A">1</text>
  <text x="90" y="354" font-size="12" fill="#1A1917">症例登録数</text>

  <circle cx="230" cy="350" r="12" fill="#E8F0EC" stroke="#1B4F3A" stroke-width="1"/>
  <text x="230" y="354" text-anchor="middle" font-size="10" font-weight="bold" fill="#1B4F3A">2</text>
  <text x="250" y="354" font-size="12" fill="#1A1917">疾患群数</text>

  <circle cx="380" cy="350" r="12" fill="#E8F0EC" stroke="#1B4F3A" stroke-width="1"/>
  <text x="380" y="354" text-anchor="middle" font-size="10" font-weight="bold" fill="#1B4F3A">3</text>
  <text x="400" y="354" font-size="12" fill="#1A1917">病歴要約件数</text>

  <circle cx="550" cy="350" r="12" fill="#E8F0EC" stroke="#1B4F3A" stroke-width="1"/>
  <text x="550" y="354" text-anchor="middle" font-size="10" font-weight="bold" fill="#1B4F3A">4</text>
  <text x="570" y="354" font-size="12" fill="#1A1917">学術活動</text>

  <circle cx="680" cy="350" r="12" fill="#E8F0EC" stroke="#1B4F3A" stroke-width="1"/>
  <text x="680" y="354" text-anchor="middle" font-size="10" font-weight="bold" fill="#1B4F3A">5</text>
  <text x="700" y="354" font-size="12" fill="#1A1917">講習会</text>

  <text x="400" y="400" text-anchor="middle" font-size="12" fill="#6B6760">J-OSLERの「研修実績」→「モニタリング」で随時確認可能</text>
  <text x="400" y="420" text-anchor="middle" font-size="12" fill="#1B4F3A" font-weight="bold">月1回は必ず進捗を確認し、遅れに早期対応する</text>

  <!-- footer -->
  <text x="400" y="488" text-anchor="middle" font-size="10" fill="#6B6760">© 内科ナビ naikanavi.com</text>
