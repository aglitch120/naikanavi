  <text x="619" y="124" font-size="11" fill="#1A1917" font-weight="bold">問題演習機能</text>
  <text x="619" y="142" font-size="10" fill="#6B6760">疾患ごとの5択問題</text>
  <text x="619" y="158" font-size="10" fill="#6B6760">苦手分野を自動判定</text>
  <text x="619" y="174" font-size="10" fill="#6B6760">苦手克服モード搭載</text>
  <text x="619" y="190" font-size="10" fill="#6B6760">1クレジット = 5問</text>
  <text x="619" y="206" font-size="10" fill="#6B6760">スマホでスキマ時間に</text>
  <text x="619" y="228" font-size="10" fill="#7F1D1D" font-weight="bold">弱点の発見と克服</text>
  <rect x="40" y="265" width="720" height="60" rx="10" fill="#E8F0EC" stroke="#1B4F3A" stroke-width="1.5"/>
  <text x="60" y="288" font-size="13" font-weight="bold" fill="#1B4F3A">補助教材（余裕があれば）</text>
  <text x="60" y="308" font-size="11" fill="#1A1917">セルフトレーニング問題集（第5集）/ 出るズバ! BOOK / 復元問題（SNS・note）/ 最新の医師国家試験問題</text>
  <rect x="40" y="340" width="720" height="60" rx="10" fill="#FEF3C7" stroke="#92400E" stroke-width="1.5"/>
  <text x="60" y="364" font-size="13" font-weight="bold" fill="#92400E">鉄則: 消化不良を避ける</text>
  <text x="60" y="386" font-size="11" fill="#1A1917">STEP 1 → 2 を2〜3周して完璧にすることが最優先。間違えた問題の復習 > 新しい教材に手を出す。</text>
  <rect x="40" y="415" width="720" height="94" rx="10" fill="#FEFEFC" stroke="#1B4F3A" stroke-width="2"/>
  <text x="60" y="440" font-size="13" font-weight="bold" fill="#1B4F3A">内科ナビなら試験対策とJ-OSLER管理を1つのアプリで</text>
  <text x="60" y="462" font-size="11" fill="#1A1917">問題演習: 苦手分野を自動判定 → 苦手克服モードで重点出題 → スキマ時間に弱点克服</text>
  <text x="60" y="480" font-size="11" fill="#1A1917">J-OSLER管理: ダッシュボードで120症例・56疾患群・29病歴要約の進捗を一覧管理</text>
  <text x="60" y="498" font-size="11" fill="#1B4F3A" font-weight="bold">naikanavi.booth.pm で詳細を見る</text>
  <text x="400" y="530" text-anchor="middle" font-size="10" fill="#6B6760">© 内科ナビ naikanavi.com</text>
</svg>