<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" font-family="'Helvetica Neue', Arial, sans-serif">
  <rect width="800" height="580" fill="#F5F4F0" rx="12"/>
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1A1917">内科専門医試験 教材タイプ別比較</text>
  <line x1="60" y1="52" x2="740" y2="52" stroke="#DDD9D2" stroke-width="1"/>
  <rect x="40" y="70" width="230" height="200" rx="10" fill="#FEFEFC" stroke="#1B4F3A" stroke-width="2"/>
  <rect x="40" y="70" width="230" height="36" rx="10" fill="#1B4F3A"/>
  <rect x="40" y="88" width="230" height="18" fill="#1B4F3A"/>
  <text x="155" y="94" text-anchor="middle" font-size="13" font-weight="bold" fill="#FEFEFC">公式過去問題集</text>
  <circle cx="65" cy="126" r="7" fill="#DCFCE7" stroke="#166534" stroke-width="1.5"/>
  <text x="62" y="130" text-anchor="middle" font-size="9" fill="#166534" font-weight="bold">+</text>
  <text x="80" y="130" font-size="11" fill="#1A1917">実際の出題問題を収録</text>
  <circle cx="65" cy="150" r="7" fill="#DCFCE7" stroke="#166534" stroke-width="1.5"/>
  <text x="62" y="154" text-anchor="middle" font-size="9" fill="#166534" font-weight="bold">+</text>
  <text x="80" y="154" font-size="11" fill="#1A1917">プール問題の把握に必須</text>
  <circle cx="65" cy="174" r="7" fill="#DCFCE7" stroke="#166534" stroke-width="1.5"/>
  <text x="62" y="178" text-anchor="middle" font-size="9" fill="#166534" font-weight="bold">+</text>
  <text x="80" y="178" font-size="11" fill="#1A1917">受験者のほぼ全員が使用</text>
  <circle cx="65" cy="202" r="7" fill="#FEE2E2" stroke="#991B1B" stroke-width="1.5"/>
  <text x="62" y="206" text-anchor="middle" font-size="9" fill="#991B1B">-</text>
  <text x="80" y="206" font-size="11" fill="#991B1B">解説がほぼない</text>
  <circle cx="65" cy="226" r="7" fill="#FEE2E2" stroke="#991B1B" stroke-width="1.5"/>
  <text x="62" y="230" text-anchor="middle" font-size="9" fill="#991B1B">-</text>
  <text x="80" y="230" font-size="11" fill="#991B1B">問題がやや古い</text>
  <text x="155" y="262" text-anchor="middle" font-size="10" fill="#1B4F3A" font-weight="bold">優先度: 最高（必須）</text>
  <rect x="285" y="70" width="230" height="200" rx="10" fill="#FEFEFC" stroke="#3D5A80" stroke-width="2"/>
  <rect x="285" y="70" width="230" height="36" rx="10" fill="#3D5A80"/>
  <rect x="285" y="88" width="230" height="18" fill="#3D5A80"/>
  <text x="400" y="94" text-anchor="middle" font-size="13" font-weight="bold" fill="#FEFEFC">市販問題集（QB等）</text>
  <circle cx="310" cy="126" r="7" fill="#DCFCE7" stroke="#166534" stroke-width="1.5"/>
  <text x="307" y="130" text-anchor="middle" font-size="9" fill="#166534" font-weight="bold">+</text>
  <text x="325" y="130" font-size="11" fill="#1A1917">丁寧な解説付き</text>
  <circle cx="310" cy="150" r="7" fill="#DCFCE7" stroke="#166534" stroke-width="1.5"/>
  <text x="307" y="154" text-anchor="middle" font-size="9" fill="#166534" font-weight="bold">+</text>
  <text x="325" y="154" font-size="11" fill="#1A1917">最新ガイドライン対応</text>
  <circle cx="310" cy="174" r="7" fill="#DCFCE7" stroke="#166534" stroke-width="1.5"/>
  <text x="307" y="178" text-anchor="middle" font-size="9" fill="#166534" font-weight="bold">+</text>
  <text x="325" y="178" font-size="11" fill="#1A1917">オンラインで隙間学習OK</text>
  <circle cx="310" cy="202" r="7" fill="#FEE2E2" stroke="#991B1B" stroke-width="1.5"/>
  <text x="307" y="206" text-anchor="middle" font-size="9" fill="#991B1B">-</text>
  <text x="325" y="206" font-size="11" fill="#991B1B">実際の出題と異なる場合も</text>
  <circle cx="310" cy="226" r="7" fill="#FEE2E2" stroke="#991B1B" stroke-width="1.5"/>
  <text x="307" y="230" text-anchor="middle" font-size="9" fill="#991B1B">-</text>
  <text x="325" y="230" font-size="11" fill="#991B1B">費用が高め（4万円超）</text>
  <text x="400" y="262" text-anchor="middle" font-size="10" fill="#3D5A80" font-weight="bold">優先度: 高</text>
  <rect x="530" y="70" width="230" height="200" rx="10" fill="#FEFEFC" stroke="#1B4F3A" stroke-width="3"/>
  <rect x="530" y="70" width="230" height="36" rx="10" fill="#7F1D1D"/>
  <rect x="530" y="88" width="230" height="18" fill="#7F1D1D"/>
  <text x="645" y="94" text-anchor="middle" font-size="13" font-weight="bold" fill="#FEFEFC">内科ナビ 問題演習</text>
  <circle cx="555" cy="126" r="7" fill="#DCFCE7" stroke="#166534" stroke-width="1.5"/>
  <text x="552" y="130" text-anchor="middle" font-size="9" fill="#166534" font-weight="bold">+</text>
  <text x="570" y="130" font-size="11" fill="#1A1917">苦手分野を自動判定</text>
  <circle cx="555" cy="150" r="7" fill="#DCFCE7" stroke="#166534" stroke-width="1.5"/>
  <text x="552" y="154" text-anchor="middle" font-size="9" fill="#166534" font-weight="bold">+</text>
  <text x="570" y="154" font-size="11" fill="#1A1917">苦手克服モードで重点出題</text>
  <circle cx="555" cy="174" r="7" fill="#DCFCE7" stroke="#166534" stroke-width="1.5"/>
  <text x="552" y="178" text-anchor="middle" font-size="9" fill="#166534" font-weight="bold">+</text>
  <text x="570" y="178" font-size="11" fill="#1A1917">J-OSLER進捗管理と一元化</text>
  <circle cx="555" cy="202" r="7" fill="#DCFCE7" stroke="#166534" stroke-width="1.5"/>
  <text x="552" y="206" text-anchor="middle" font-size="9" fill="#166534" font-weight="bold">+</text>
  <text x="570" y="206" font-size="11" fill="#1A1917">1クレジット5問の従量課金</text>
  <circle cx="555" cy="226" r="7" fill="#DCFCE7" stroke="#166534" stroke-width="1.5"/>
  <text x="552" y="230" text-anchor="middle" font-size="9" fill="#166534" font-weight="bold">+</text>
  <text x="570" y="230" font-size="11" fill="#1A1917">スマホで通勤中にも演習</text>
  <text x="645" y="262" text-anchor="middle" font-size="10" fill="#7F1D1D" font-weight="bold">弱点克服の最適解</text>
  <rect x="40" y="290" width="720" height="80" rx="10" fill="#FEFEFC" stroke="#92400E" stroke-width="2"/>
  <rect x="40" y="290" width="720" height="36" rx="10" fill="#92400E"/>
  <rect x="40" y="308" width="720" height="18" fill="#92400E"/>
  <text x="400" y="314" text-anchor="middle" font-size="13" font-weight="bold" fill="#FEFEFC">復元問題（非公式）</text>
  <text x="60" y="346" font-size="11" fill="#1A1917">受験経験者の記憶ベースの問題再現。解説なし、精度にばらつき。近年は学会がSNS投稿を厳しく制限。</text>
  <text x="60" y="362" font-size="10" fill="#6B6760">優先度: 低（余裕があれば参照）。出題テーマの把握に活用し、周辺知識をイヤーノートで調べる使い方が有効。</text>
  <rect x="40" y="388" width="720" height="66" rx="10" fill="#E8F0EC" stroke="#1B4F3A" stroke-width="1.5"/>
  <text x="60" y="412" font-size="13" font-weight="bold" fill="#1B4F3A">おすすめの組み合わせ</text>
  <text x="60" y="434" font-size="12" fill="#1A1917">公式過去問 2〜3周 + QB/QC 1〜2周 + 内科ナビ問題演習で苦手克服 = 合格ラインに到達可能</text>
  <text x="60" y="448" font-size="10" fill="#6B6760">教材の完成度 > 教材の数。間違えた問題を徹底的に潰すことが得点力に直結する。</text>
  <rect x="40" y="470" width="720" height="80" rx="10" fill="#FEFEFC" stroke="#1B4F3A" stroke-width="2"/>
  <text x="60" y="494" font-size="13" font-weight="bold" fill="#1B4F3A">内科ナビ = 試験対策 + J-OSLER管理が1つのアプリで完結</text>
  <text x="60" y="514" font-size="11" fill="#1A1917">問題演習（苦手自動判定・苦手克服モード）/ ダッシュボード（120症例・56疾患群・29病歴要約）</text>
  <text x="60" y="532" font-size="11" fill="#1A1917">AI病歴要約テンプレート（70疾患群・373疾患対応）/ JMECC・講習会の要件管理</text>
  <text x="400" y="570" text-anchor="middle" font-size="10" fill="#6B6760">© 内科ナビ naikanavi.com</text>
</svg>