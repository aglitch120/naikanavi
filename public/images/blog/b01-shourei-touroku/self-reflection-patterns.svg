<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" fill="none">
  <rect width="800" height="300" rx="16" fill="#F5F4F0"/>
  
  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="18" font-weight="700" fill="#1A1917">自己省察の3つの型</text>
  
  <!-- Pattern 1 -->
  <rect x="30" y="60" width="235" height="200" rx="12" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1.5"/>
  <circle cx="147" cy="100" r="22" fill="#E8F0EC"/>
  <text x="147" y="106" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="20">💡</text>
  <text x="147" y="140" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="#1B4F3A">学びの気づき型</text>
  <text x="147" y="165" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="11" fill="#6B6760">新たに学んだことを記述</text>
  <text x="147" y="182" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="11" fill="#6B6760">最も汎用性が高い</text>
  
  <rect x="55" y="200" width="180" height="24" rx="4" fill="#E8F0EC"/>
