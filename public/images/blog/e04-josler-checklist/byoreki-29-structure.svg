<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Noto Sans JP', sans-serif">
  <defs>
    <filter id="shadow3" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" rx="16" fill="#F5F4F0"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1A1917">病歴要約29症例の構成チェック</text>

  <!-- Main card -->
  <rect x="30" y="58" width="740" height="80" rx="10" fill="#FEFEFC" stroke="#DDD9D2" filter="url(#shadow3)"/>
  <text x="50" y="86" font-size="14" font-weight="bold" fill="#3D5A80">基本ルール</text>
  <text x="50" y="108" font-size="12" fill="#1A1917">29症例すべてが異なる疾患群から選択されていること（外科紹介症例・剖検症例のみ重複可）</text>
  <text x="50" y="126" font-size="12" fill="#1A1917">外来症例は29症例中7編以内。残りは入院症例。</text>

  <!-- Required compositions -->
  <rect x="30" y="152" width="355" height="210" rx="10" fill="#FEFEFC" stroke="#DDD9D2" filter="url(#shadow3)"/>
  <rect x="30" y="152" width="355" height="36" rx="10" fill="#3D5A80"/>
  <rect x="30" y="176" width="355" height="12" fill="#3D5A80"/>
  <text x="207" y="176" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">必須で含める症例</text>

  <!-- Items -->
  <rect x="50" y="200" width="315" height="34" rx="6" fill="#E8F0EC"/>
  <text x="66" y="222" font-size="13" fill="#1A1917">外科紹介症例</text>
  <rect x="280" y="206" width="70" height="22" rx="4" fill="#1B4F3A"/>
  <text x="315" y="221" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">2編</text>

  <rect x="50" y="244" width="315" height="34" rx="6" fill="#E8F0EC"/>
  <text x="66" y="266" font-size="13" fill="#1A1917">剖検症例</text>
  <rect x="280" y="250" width="70" height="22" rx="4" fill="#1B4F3A"/>
  <text x="315" y="265" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">含む</text>

  <rect x="50" y="288" width="315" height="56" rx="6" fill="#FEF3C7"/>
  <text x="66" y="310" font-size="13" fill="#92400E" font-weight="bold">消化器: 消化管・肝臓・胆膵を含む</text>
  <text x="66" y="332" font-size="13" fill="#92400E" font-weight="bold">総合内科: I(一般)・II(高齢者)・腫瘍 各1例</text>

  <!-- Evaluation flow -->
  <rect x="415" y="152" width="355" height="210" rx="10" fill="#FEFEFC" stroke="#DDD9D2" filter="url(#shadow3)"/>
  <rect x="415" y="152" width="355" height="36" rx="10" fill="#0D7377"/>
  <rect x="415" y="176" width="355" height="12" fill="#0D7377"/>
  <text x="592" y="176" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">評価の3ステップ</text>

  <!-- Step 1 -->
  <rect x="435" y="200" width="315" height="34" rx="6" fill="#E8F0EC"/>
  <circle cx="455" cy="217" r="11" fill="#1B4F3A"/>
  <text x="455" y="221" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">1</text>
  <text x="475" y="222" font-size="13" fill="#1A1917">個別評価（担当指導医）</text>

  <!-- Arrow -->
  <path d="M592 238 L592 244 L586 244 L592 252 L598 244 L592 244" fill="#0D7377"/>

  <!-- Step 2 -->
  <rect x="435" y="254" width="315" height="34" rx="6" fill="#E8F0EC"/>
  <circle cx="455" cy="271" r="11" fill="#1B4F3A"/>
  <text x="455" y="275" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">2</text>
  <text x="475" y="276" font-size="13" fill="#1A1917">一次評価（病歴指導医+統括責任者）</text>

  <!-- Arrow -->
  <path d="M592 292 L592 298 L586 298 L592 306 L598 298 L592 298" fill="#0D7377"/>

  <!-- Step 3 -->
  <rect x="435" y="308" width="315" height="34" rx="6" fill="#E8F0EC"/>
  <circle cx="455" cy="325" r="11" fill="#1B4F3A"/>
  <text x="455" y="329" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">3</text>
  <text x="475" y="330" font-size="13" fill="#1A1917">二次評価（学会査読委員）</text>

  <!-- Footer -->
  <text x="400" y="388" text-anchor="middle" font-size="10" fill="#6B6760">© 内科ナビ naikanavi.com</text>
</svg>