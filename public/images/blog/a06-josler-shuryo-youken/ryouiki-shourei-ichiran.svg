<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Noto Sans JP', sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" rx="16" fill="#F5F4F0"/>
  
  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" fill="#1A1917" font-size="16" font-weight="bold">各領域の最低登録症例数（7期生以降：120症例版）</text>
  <text x="400" y="54" text-anchor="middle" fill="#6B6760" font-size="10">56疾患群以上の経験＋各領域の最低症例数を満たす必要あり</text>

  <!-- Table Header -->
  <rect x="30" y="70" width="740" height="32" rx="6" fill="#1B4F3A"/>
  <text x="200" y="91" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">領域</text>
  <text x="420" y="91" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">疾患群数</text>
  <text x="560" y="91" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">最低症例数</text>
  <text x="690" y="91" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">備考</text>

  <!-- Row template: alternating colors -->
  <!-- Row 1 -->
  <rect x="30" y="102" width="740" height="28" fill="#FEFEFC"/>
  <text x="200" y="121" text-anchor="middle" fill="#1A1917" font-size="11">総合内科</text>
  <text x="420" y="121" text-anchor="middle" fill="#1A1917" font-size="11">3</text>
  <text x="560" y="121" text-anchor="middle" fill="#1B4F3A" font-size="11" font-weight="bold">6</text>
  <text x="690" y="121" text-anchor="middle" fill="#6B6760" font-size="9">一般・高齢者・腫瘍</text>

  <!-- Row 2 -->
  <rect x="30" y="130" width="740" height="28" fill="#F0EDE7"/>
  <text x="200" y="149" text-anchor="middle" fill="#1A1917" font-size="11">消化器</text>
  <text x="420" y="149" text-anchor="middle" fill="#1A1917" font-size="11">9</text>
  <text x="560" y="149" text-anchor="middle" fill="#1B4F3A" font-size="11" font-weight="bold">15</text>
  <text x="690" y="149" text-anchor="middle" fill="#6B6760" font-size="9">消化管・肝・胆膵含む</text>

  <!-- Row 3 -->
  <rect x="30" y="158" width="740" height="28" fill="#FEFEFC"/>
  <text x="200" y="177" text-anchor="middle" fill="#1A1917" font-size="11">循環器</text>
  <text x="420" y="177" text-anchor="middle" fill="#1A1917" font-size="11">7</text>
  <text x="560" y="177" text-anchor="middle" fill="#1B4F3A" font-size="11" font-weight="bold">10</text>
  <text x="690" y="177" text-anchor="middle" fill="#6B6760" font-size="9"></text>

  <!-- Row 4 -->
  <rect x="30" y="186" width="740" height="28" fill="#F0EDE7"/>
  <text x="200" y="205" text-anchor="middle" fill="#1A1917" font-size="11">内分泌</text>
  <text x="420" y="205" text-anchor="middle" fill="#1A1917" font-size="11">5</text>
  <text x="560" y="205" text-anchor="middle" fill="#1B4F3A" font-size="11" font-weight="bold">6</text>
  <text x="690" y="205" text-anchor="middle" fill="#6B6760" font-size="9"></text>

  <!-- Row 5 -->
  <rect x="30" y="214" width="740" height="28" fill="#FEFEFC"/>
  <text x="200" y="233" text-anchor="middle" fill="#1A1917" font-size="11">代謝</text>
  <text x="420" y="233" text-anchor="middle" fill="#1A1917" font-size="11">4</text>
  <text x="560" y="233" text-anchor="middle" fill="#1B4F3A" font-size="11" font-weight="bold">6</text>
  <text x="690" y="233" text-anchor="middle" fill="#6B6760" font-size="9"></text>

  <!-- Row 6 -->
  <rect x="30" y="242" width="740" height="28" fill="#F0EDE7"/>
  <text x="200" y="261" text-anchor="middle" fill="#1A1917" font-size="11">腎臓</text>
  <text x="420" y="261" text-anchor="middle" fill="#1A1917" font-size="11">4</text>
  <text x="560" y="261" text-anchor="middle" fill="#1B4F3A" font-size="11" font-weight="bold">6</text>
  <text x="690" y="261" text-anchor="middle" fill="#6B6760" font-size="9"></text>

  <!-- Row 7 -->
  <rect x="30" y="270" width="740" height="28" fill="#FEFEFC"/>
  <text x="200" y="289" text-anchor="middle" fill="#1A1917" font-size="11">呼吸器</text>
  <text x="420" y="289" text-anchor="middle" fill="#1A1917" font-size="11">7</text>
  <text x="560" y="289" text-anchor="middle" fill="#1B4F3A" font-size="11" font-weight="bold">10</text>
  <text x="690" y="289" text-anchor="middle" fill="#6B6760" font-size="9"></text>

  <!-- Row 8 -->
  <rect x="30" y="298" width="740" height="28" fill="#F0EDE7"/>
  <text x="200" y="317" text-anchor="middle" fill="#1A1917" font-size="11">血液</text>
  <text x="420" y="317" text-anchor="middle" fill="#1A1917" font-size="11">6</text>
  <text x="560" y="317" text-anchor="middle" fill="#1B4F3A" font-size="11" font-weight="bold">8</text>
  <text x="690" y="317" text-anchor="middle" fill="#6B6760" font-size="9"></text>

  <!-- Row 9 -->
  <rect x="30" y="326" width="740" height="28" fill="#FEFEFC"/>
  <text x="200" y="345" text-anchor="middle" fill="#1A1917" font-size="11">神経</text>
  <text x="420" y="345" text-anchor="middle" fill="#1A1917" font-size="11">8</text>
  <text x="560" y="345" text-anchor="middle" fill="#1B4F3A" font-size="11" font-weight="bold">10</text>
  <text x="690" y="345" text-anchor="middle" fill="#6B6760" font-size="9"></text>

  <!-- Row 10 -->
  <rect x="30" y="354" width="740" height="28" fill="#F0EDE7"/>
  <text x="200" y="373" text-anchor="middle" fill="#1A1917" font-size="11">アレルギー・膠原病</text>
  <text x="420" y="373" text-anchor="middle" fill="#1A1917" font-size="11">7</text>
  <text x="560" y="373" text-anchor="middle" fill="#1B4F3A" font-size="11" font-weight="bold">8</text>
  <text x="690" y="373" text-anchor="middle" fill="#6B6760" font-size="9"></text>

  <!-- Row 11 -->
  <rect x="30" y="382" width="740" height="28" fill="#FEFEFC"/>
  <text x="200" y="401" text-anchor="middle" fill="#1A1917" font-size="11">感染症</text>
  <text x="420" y="401" text-anchor="middle" fill="#1A1917" font-size="11">4</text>
  <text x="560" y="401" text-anchor="middle" fill="#1B4F3A" font-size="11" font-weight="bold">6</text>
  <text x="690" y="401" text-anchor="middle" fill="#6B6760" font-size="9"></text>

  <!-- Row 12 -->
  <rect x="30" y="410" width="740" height="28" fill="#F0EDE7"/>
  <text x="200" y="429" text-anchor="middle" fill="#1A1917" font-size="11">救急</text>
  <text x="420" y="429" text-anchor="middle" fill="#1A1917" font-size="11">6</text>
  <text x="560" y="429" text-anchor="middle" fill="#1B4F3A" font-size="11" font-weight="bold">9</text>
  <text x="690" y="429" text-anchor="middle" fill="#6B6760" font-size="9"></text>

  <!-- Total row -->
  <rect x="30" y="446" width="740" height="32" rx="0 0 6 6" fill="#E8F0EC"/>
  <text x="200" y="467" text-anchor="middle" fill="#1B4F3A" font-size="12" font-weight="bold">合計</text>
  <text x="420" y="467" text-anchor="middle" fill="#1B4F3A" font-size="12" font-weight="bold">70</text>
  <text x="560" y="467" text-anchor="middle" fill="#1B4F3A" font-size="12" font-weight="bold">100</text>
  <text x="690" y="467" text-anchor="middle" fill="#6B6760" font-size="9">残り20症例は自由</text>

  <!-- Note -->
  <text x="400" y="498" text-anchor="middle" fill="#6B6760" font-size="10">※ 各領域50%以上の疾患群での経験が必要 ／ 外来症例は全体の1割まで</text>

  <!-- Footer -->
  <text x="770" y="515" text-anchor="end" fill="#C8C4BC" font-size="9">© 内科ナビ naikanavi.com</text>
</svg>
