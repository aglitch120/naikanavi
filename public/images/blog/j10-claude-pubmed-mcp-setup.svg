<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="s2" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1A1917" flood-opacity="0.08"/>
    </filter>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1B4F3A"/>
    </marker>
  </defs>
  <rect width="800" height="400" rx="16" fill="#F5F4F0"/>
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1B4F3A">PubMed MCP 導入3ステップ</text>
  <text x="400" y="55" text-anchor="middle" font-size="11" fill="#6B6760">Claude Desktopアプリで使う場合の手順</text>

  <!-- Step 1 -->
  <rect x="30" y="80" width="220" height="160" rx="12" fill="#FEFEFC" stroke="#1B4F3A" stroke-width="2" filter="url(#s2)"/>
  <rect x="30" y="80" width="220" height="40" rx="12" fill="#1B4F3A"/>
  <rect x="30" y="108" width="220" height="12" fill="#1B4F3A"/>
  <text x="140" y="106" text-anchor="middle" font-size="14" font-weight="bold" fill="#FEFEFC">Step 1: 準備</text>
  <text x="50" y="145" font-size="12" fill="#1A1917">1. Claude Desktopを</text>
  <text x="55" y="162" font-size="12" fill="#1A1917">インストール</text>
  <text x="50" y="185" font-size="12" fill="#1A1917">2. Node.jsをインストール</text>
  <text x="50" y="208" font-size="12" fill="#6B6760">（どちらも無料）</text>

  <!-- Arrow -->
  <line x1="250" y1="160" x2="285" y2="160" stroke="#1B4F3A" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Step 2 -->
  <rect x="295" y="80" width="220" height="160" rx="12" fill="#FEFEFC" stroke="#1B4F3A" stroke-width="2" filter="url(#s2)"/>
  <rect x="295" y="80" width="220" height="40" rx="12" fill="#1B4F3A"/>
  <rect x="295" y="108" width="220" height="12" fill="#1B4F3A"/>
  <text x="405" y="106" text-anchor="middle" font-size="14" font-weight="bold" fill="#FEFEFC">Step 2: 設定</text>
  <text x="315" y="145" font-size="12" fill="#1A1917">設定ファイル（JSON）に</text>
  <text x="315" y="165" font-size="12" fill="#1A1917">PubMed MCPサーバーの</text>
  <text x="315" y="185" font-size="12" fill="#1A1917">情報を追記</text>
  <text x="315" y="210" font-size="11" fill="#6B6760">コピペでOK（5分）</text>

  <!-- Arrow -->
  <line x1="515" y1="160" x2="550" y2="160" stroke="#1B4F3A" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Step 3 -->
  <rect x="560" y="80" width="220" height="160" rx="12" fill="#FEFEFC" stroke="#1B4F3A" stroke-width="2" filter="url(#s2)"/>
  <rect x="560" y="80" width="220" height="40" rx="12" fill="#1B4F3A"/>
  <rect x="560" y="108" width="220" height="12" fill="#1B4F3A"/>
  <text x="670" y="106" text-anchor="middle" font-size="14" font-weight="bold" fill="#FEFEFC">Step 3: 使う</text>
  <text x="580" y="145" font-size="12" fill="#1A1917">Claude再起動後、</text>
  <text x="580" y="165" font-size="12" fill="#1A1917">「心不全のRCTを</text>
  <text x="580" y="185" font-size="12" fill="#1A1917">5本探して」と入力</text>
  <text x="580" y="210" font-size="11" fill="#166534">PubMedから直接取得!</text>

  <!-- Bottom note -->
  <rect x="30" y="270" width="740" height="80" rx="10" fill="#E8F0EC" stroke="#1B4F3A" stroke-width="1"/>
  <text x="50" y="295" font-size="13" font-weight="bold" fill="#1B4F3A">Web版Claude（claude.ai）でも使える方法</text>
  <text x="50" y="318" font-size="12" fill="#1A1917">claude.aiの「インテグレーション」設定からPubMed MCPを有効にするだけ（デスクトップ版不要）。</text>
  <text x="50" y="338" font-size="12" fill="#1A1917">有料プラン（Pro / Team / Enterprise）が必要。設定後はチャット内で自動的にPubMed検索が使える。</text>

  <text x="400" y="380" text-anchor="middle" font-size="10" fill="#6B6760">© 内科ナビ naikanavi.com</text>
</svg>
