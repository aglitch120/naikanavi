<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="'Noto Sans JP', 'Hiragino Sans', sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1A1917" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3D5A80"/>
      <stop offset="100%" stop-color="#1E3A5F"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" rx="16" fill="#F5F4F0"/>

  <!-- Header -->
  <rect x="24" y="20" width="752" height="52" rx="12" fill="url(#headerGrad)"/>
  <text x="400" y="53" text-anchor="middle" fill="#FEFEFC" font-size="20" font-weight="700">160症例の全体像｜知っておくべき3つの数字</text>

  <!-- Card 1: 160 -->
  <rect x="24" y="92" width="240" height="160" rx="12" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="24" y="92" width="240" height="44" rx="12" fill="#1E3A5F"/>
  <rect x="24" y="120" width="240" height="16" fill="#1E3A5F"/>
  <text x="144" y="120" text-anchor="middle" fill="#FEFEFC" font-size="15" font-weight="700">総症例数</text>
  <text x="144" y="182" text-anchor="middle" fill="#1E3A5F" font-size="48" font-weight="900">160</text>
  <text x="144" y="206" text-anchor="middle" fill="#6B6760" font-size="12">症例（7期生以降は120）</text>
  <text x="144" y="228" text-anchor="middle" fill="#6B6760" font-size="11">主担当：56 ／ 関わった：104</text>

  <!-- Card 2: 56 -->
  <rect x="280" y="92" width="240" height="160" rx="12" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="280" y="92" width="240" height="44" rx="12" fill="#1B4F3A"/>
  <rect x="280" y="120" width="240" height="16" fill="#1B4F3A"/>
  <text x="400" y="120" text-anchor="middle" fill="#FEFEFC" font-size="15" font-weight="700">疾患群</text>
  <text x="400" y="182" text-anchor="middle" fill="#1B4F3A" font-size="48" font-weight="900">56</text>
  <text x="400" y="206" text-anchor="middle" fill="#6B6760" font-size="12">疾患群をカバー</text>
  <text x="400" y="228" text-anchor="middle" fill="#6B6760" font-size="11">消化器・循環器・呼吸器 ...等</text>

  <!-- Card 3: 29 -->
  <rect x="536" y="92" width="240" height="160" rx="12" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="536" y="92" width="240" height="44" rx="12" fill="#0D7377"/>
  <rect x="536" y="120" width="240" height="16" fill="#0D7377"/>
  <text x="656" y="120" text-anchor="middle" fill="#FEFEFC" font-size="15" font-weight="700">病歴要約</text>
  <text x="656" y="182" text-anchor="middle" fill="#0D7377" font-size="48" font-weight="900">29</text>
  <text x="656" y="206" text-anchor="middle" fill="#6B6760" font-size="12">症例分を作成</text>
  <text x="656" y="228" text-anchor="middle" fill="#6B6760" font-size="11">外来7篇以内・剖検含む</text>

  <!-- Timeline section -->
  <rect x="24" y="276" width="752" height="180" rx="12" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="306" text-anchor="middle" fill="#1A1917" font-size="16" font-weight="700">理想的な登録ペース（3年間）</text>

  <!-- Timeline bar -->
  <rect x="60" y="330" width="680" height="12" rx="6" fill="#E8E5DF"/>
  <rect x="60" y="330" width="227" height="12" rx="6" fill="#1E3A5F"/>
  <rect x="287" y="330" width="227" height="12" rx="0" fill="#1B4F3A"/>
  <rect x="514" y="330" width="226" height="12" rx="6" fill="#0D7377"/>

  <!-- Year labels -->
  <text x="173" y="362" text-anchor="middle" fill="#1E3A5F" font-size="14" font-weight="700">1年目</text>
  <text x="173" y="382" text-anchor="middle" fill="#6B6760" font-size="12">60症例（月5件）</text>
  <text x="173" y="398" text-anchor="middle" fill="#6B6760" font-size="11">主担当20 + 関わった40</text>

  <text x="400" y="362" text-anchor="middle" fill="#1B4F3A" font-size="14" font-weight="700">2年目</text>
  <text x="400" y="382" text-anchor="middle" fill="#6B6760" font-size="12">60症例（月5件）</text>
  <text x="400" y="398" text-anchor="middle" fill="#6B6760" font-size="11">不足疾患群を重点的に</text>

  <text x="627" y="362" text-anchor="middle" fill="#0D7377" font-size="14" font-weight="700">3年目</text>
  <text x="627" y="382" text-anchor="middle" fill="#6B6760" font-size="12">40症例 + 病歴要約29本</text>
  <text x="627" y="398" text-anchor="middle" fill="#6B6760" font-size="11">調整 + 要約執筆に集中</text>

  <!-- Milestone dots -->
  <circle cx="60" cy="336" r="8" fill="#1E3A5F"/>
  <circle cx="287" cy="336" r="8" fill="#1B4F3A"/>
  <circle cx="514" cy="336" r="8" fill="#0D7377"/>
  <circle cx="740" cy="336" r="8" fill="#B8860B"/>

  <!-- Footer -->
  <text x="776" y="472" text-anchor="end" fill="#A9A49E" font-size="10">© 内科ナビ naikanavi.com</text>
</svg>
