<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" fill="none">
  <rect width="800" height="340" rx="16" fill="#F5F4F0"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="18" font-weight="700" fill="#1A1917">症例登録の入力項目</text>
  
  <!-- Part 1: Basic Info -->
  <rect x="30" y="65" width="230" height="230" rx="12" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1.5"/>
  <rect x="30" y="65" width="230" height="44" rx="12" fill="#1E3A5F"/>
  <rect x="30" y="90" width="230" height="19" fill="#1E3A5F"/>
  <text x="145" y="93" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="white">パート1：基本情報</text>
  
  <!-- Clipboard icon -->
  <rect x="60" y="120" width="16" height="16" rx="3" fill="none" stroke="#3D5A80" stroke-width="1.5"/>
  <rect x="65" y="116" width="6" height="4" rx="1" fill="#3D5A80"/>
  <text x="85" y="133" font-family="'Noto Sans JP', sans-serif" font-size="12" fill="#6B6760">経験時期・受持期間</text>
  
  <rect x="60" y="148" width="16" height="16" rx="3" fill="none" stroke="#3D5A80" stroke-width="1.5"/>
  <rect x="65" y="144" width="6" height="4" rx="1" fill="#3D5A80"/>
  <text x="85" y="161" font-family="'Noto Sans JP', sans-serif" font-size="12" fill="#6B6760">施設名・領域・疾患群</text>
  
  <rect x="60" y="176" width="16" height="16" rx="3" fill="none" stroke="#3D5A80" stroke-width="1.5"/>
  <rect x="65" y="172" width="6" height="4" rx="1" fill="#3D5A80"/>
  <text x="85" y="189" font-family="'Noto Sans JP', sans-serif" font-size="12" fill="#6B6760">患者ID・年齢・性別</text>
  
  <rect x="60" y="204" width="16" height="16" rx="3" fill="none" stroke="#3D5A80" stroke-width="1.5"/>
  <rect x="65" y="200" width="6" height="4" rx="1" fill="#3D5A80"/>
  <text x="85" y="217" font-family="'Noto Sans JP', sans-serif" font-size="12" fill="#6B6760">指導医・担当状況</text>
  
  <rect x="60" y="232" width="16" height="16" rx="3" fill="none" stroke="#3D5A80" stroke-width="1.5"/>
  <rect x="65" y="228" width="6" height="4" rx="1" fill="#3D5A80"/>
  <text x="85" y="245" font-family="'Noto Sans JP', sans-serif" font-size="12" fill="#6B6760">プロブレムリスト</text>
  
  <rect x="50" y="264" width="190" height="22" rx="4" fill="#E8F0EC"/>
  <text x="145" y="280" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="11" font-weight="600" fill="#1B4F3A">→ カルテから転記するだけ</text>

  <!-- Arrow 1 -->
  <path d="M270 180 L290 180" stroke="#C8C4BC" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Part 2: Case Summary -->
  <rect x="295" y="65" width="230" height="230" rx="12" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1.5"/>
  <rect x="295" y="65" width="230" height="44" rx="12" fill="#1B4F3A"/>
  <rect x="295" y="90" width="230" height="19" fill="#1B4F3A"/>
  <text x="410" y="93" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="white">パート2：症例の概略</text>
  
  <!-- Pen icon area -->
  <circle cx="410" cy="155" r="24" fill="#E8F0EC"/>
  <path d="M402 163 L418 147 L421 150 L405 166 L400 167 Z" fill="#1B4F3A"/>
  
  <text x="410" y="200" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="16" font-weight="700" fill="#1A1917">500字以内</text>
  <text x="410" y="222" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="12" fill="#6B6760">現病歴と入院後経過を</text>
  <text x="410" y="240" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="12" fill="#6B6760">簡潔にまとめる</text>
  
  <rect x="315" y="264" width="190" height="22" rx="4" fill="#E8F0EC"/>
  <text x="410" y="280" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="11" font-weight="600" fill="#1B4F3A">→ 退院サマリーを要約</text>

  <!-- Arrow 2 -->
  <path d="M535 180 L555 180" stroke="#C8C4BC" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Part 3: Self Reflection -->
  <rect x="560" y="65" width="210" height="230" rx="12" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1.5"/>
  <rect x="560" y="65" width="210" height="44" rx="12" fill="#2D6A4F"/>
  <rect x="560" y="90" width="210" height="19" fill="#2D6A4F"/>
  <text x="665" y="93" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="white">パート3：自己省察</text>
  
  <!-- Lightbulb icon area -->
  <circle cx="665" cy="155" r="24" fill="#DCFCE7"/>
  <circle cx="665" cy="150" r="10" fill="none" stroke="#166534" stroke-width="2"/>
  <line x1="662" y1="160" x2="668" y2="160" stroke="#166534" stroke-width="2"/>
  <line x1="663" y1="164" x2="667" y2="164" stroke="#166534" stroke-width="1.5"/>
  
  <text x="665" y="200" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="16" font-weight="700" fill="#1A1917">300字以内</text>
  <text x="665" y="222" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="12" fill="#6B6760">症例からの気づき・</text>
  <text x="665" y="240" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="12" fill="#6B6760">学びを振り返る</text>
  
  <rect x="580" y="264" width="170" height="22" rx="4" fill="#DCFCE7"/>
  <text x="665" y="280" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="11" font-weight="600" fill="#166534">→ 1〜2行でもOK</text>

  <!-- Footer -->
  <text x="400" y="328" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="10" fill="#C8C4BC">© 内科ナビ naikanavi.com</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0 0 L8 3 L0 6" fill="none" stroke="#C8C4BC" stroke-width="1.5"/>
    </marker>
  </defs>
</svg>
