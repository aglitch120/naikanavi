<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1A1917" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1B4F3A"/>
      <stop offset="100%" stop-color="#155230"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1B4F3A"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="520" rx="16" fill="#F5F4F0"/>

  <!-- ヘッダー -->
  <rect x="0" y="0" width="800" height="56" rx="16" fill="url(#headerGrad)"/>
  <rect x="0" y="28" width="800" height="28" fill="url(#headerGrad)"/>
  <text x="400" y="36" text-anchor="middle" fill="#FEFEFC" font-size="18" font-weight="bold">二次評価の流れ｜提出からAcceptまで</text>

  <!-- ステップ1: 一次評価完了 -->
  <rect x="40" y="80" width="160" height="80" rx="12" fill="#FEFEFC" stroke="#1B4F3A" stroke-width="2" filter="url(#shadow)"/>
  <text x="120" y="108" text-anchor="middle" fill="#1B4F3A" font-size="13" font-weight="bold">STEP 1</text>
  <text x="120" y="130" text-anchor="middle" fill="#1A1917" font-size="12">一次評価完了</text>
  <text x="120" y="148" text-anchor="middle" fill="#6B6760" font-size="10">29件全件Accept</text>

  <!-- 矢印1 -->
  <line x1="200" y1="120" x2="240" y2="120" stroke="#1B4F3A" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ステップ2: 二次評価依頼 -->
  <rect x="250" y="80" width="160" height="80" rx="12" fill="#FEFEFC" stroke="#1B4F3A" stroke-width="2" filter="url(#shadow)"/>
  <text x="330" y="108" text-anchor="middle" fill="#1B4F3A" font-size="13" font-weight="bold">STEP 2</text>
  <text x="330" y="130" text-anchor="middle" fill="#1A1917" font-size="12">二次評価依頼</text>
  <text x="330" y="148" text-anchor="middle" fill="#6B6760" font-size="10">専攻医がJ-OSLERで提出</text>

  <!-- 矢印2 -->
  <line x1="410" y1="120" x2="450" y2="120" stroke="#1B4F3A" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ステップ3: 査読委員が評価 -->
  <rect x="460" y="80" width="160" height="80" rx="12" fill="#E8F0EC" stroke="#1B4F3A" stroke-width="2" filter="url(#shadow)"/>
  <text x="540" y="108" text-anchor="middle" fill="#1B4F3A" font-size="13" font-weight="bold">STEP 3</text>
  <text x="540" y="130" text-anchor="middle" fill="#1A1917" font-size="12">査読委員が評価</text>
  <text x="540" y="148" text-anchor="middle" fill="#6B6760" font-size="10">初回21日以内が目安</text>

  <!-- 矢印3 -->
  <line x1="620" y1="120" x2="660" y2="120" stroke="#1B4F3A" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ステップ4: 結果通知 -->
  <rect x="670" y="80" width="100" height="80" rx="12" fill="#FEFEFC" stroke="#1B4F3A" stroke-width="2" filter="url(#shadow)"/>
  <text x="720" y="108" text-anchor="middle" fill="#1B4F3A" font-size="13" font-weight="bold">STEP 4</text>
  <text x="720" y="130" text-anchor="middle" fill="#1A1917" font-size="12">結果通知</text>

  <!-- 3つの結果分岐 -->
  <!-- Accept -->
  <rect x="40" y="220" width="200" height="70" rx="10" fill="#DCFCE7" stroke="#166534" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="68" cy="245" r="14" fill="#166534"/>
  <text x="68" y="250" text-anchor="middle" fill="white" font-size="14" font-weight="bold">&#x2713;</text>
  <text x="150" y="245" text-anchor="middle" fill="#166534" font-size="14" font-weight="bold">Accept（承認）</text>
  <text x="150" y="268" text-anchor="middle" fill="#1A1917" font-size="11">二次評価完了 → 修了認定へ</text>

  <!-- Revision -->
  <rect x="280" y="220" width="230" height="70" rx="10" fill="#FEF3C7" stroke="#92400E" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="312" cy="245" r="14" fill="#92400E"/>
  <text x="312" y="250" text-anchor="middle" fill="white" font-size="14" font-weight="bold">!</text>
  <text x="410" y="245" text-anchor="middle" fill="#92400E" font-size="14" font-weight="bold">Revision（要修正）</text>
  <text x="410" y="268" text-anchor="middle" fill="#1A1917" font-size="11">修正して再提出（最大3回まで）</text>

  <!-- Reject -->
  <rect x="550" y="220" width="210" height="70" rx="10" fill="#FEE2E2" stroke="#991B1B" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="578" cy="245" r="14" fill="#991B1B"/>
  <text x="578" y="251" text-anchor="middle" fill="white" font-size="14" font-weight="bold">&#x2717;</text>
  <text x="668" y="245" text-anchor="middle" fill="#991B1B" font-size="14" font-weight="bold">Reject（要差替え）</text>
  <text x="668" y="268" text-anchor="middle" fill="#1A1917" font-size="11">別の症例で再作成（初回のみ）</text>

  <!-- 結果通知からの矢印 -->
  <line x1="720" y1="160" x2="720" y2="190" stroke="#6B6760" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="140" y1="190" x2="720" y2="190" stroke="#6B6760" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="140" y1="190" x2="140" y2="220" stroke="#166534" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="395" y1="190" x2="395" y2="220" stroke="#92400E" stroke-width="2"/>
  <line x1="655" y1="190" x2="655" y2="220" stroke="#991B1B" stroke-width="2"/>

  <!-- Revisionの再提出ループ -->
  <path d="M 395 290 L 395 330 Q 395 345 380 345 L 180 345 Q 165 345 165 330 L 165 165 Q 165 155 175 155 L 240 155" fill="none" stroke="#92400E" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <rect x="210" y="320" width="130" height="28" rx="6" fill="#FEF3C7" stroke="#92400E" stroke-width="1"/>
  <text x="275" y="339" text-anchor="middle" fill="#92400E" font-size="11" font-weight="bold">修正して再提出</text>

  <!-- 補足情報パネル -->
  <rect x="40" y="380" width="340" height="100" rx="10" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1.5"/>
  <text x="60" y="405" fill="#1B4F3A" font-size="13" font-weight="bold">評価期間</text>
  <text x="60" y="425" fill="#1A1917" font-size="11">研修3年目以降: 4月〜10月末</text>
  <text x="60" y="445" fill="#1A1917" font-size="11">Revision最終Accept期限: 12月20日</text>
  <text x="60" y="465" fill="#6B6760" font-size="10">※画面上の評価期限は目安。超過しても操作可能</text>

  <rect x="420" y="380" width="340" height="100" rx="10" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1.5"/>
  <text x="440" y="405" fill="#1B4F3A" font-size="13" font-weight="bold">匿名評価</text>
  <text x="440" y="425" fill="#1A1917" font-size="11">査読委員には専攻医の氏名・施設が非表示</text>
  <text x="440" y="445" fill="#1A1917" font-size="11">専攻医にも査読委員の名前は非開示</text>
  <text x="440" y="465" fill="#6B6760" font-size="10">同じプログラムの関係者は評価を担当しない</text>

  <!-- フッター -->
  <text x="400" y="508" text-anchor="middle" fill="#6B6760" font-size="9">© 内科ナビ naikanavi.com</text>
</svg>
