<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="'Noto Sans JP', 'Hiragino Sans', sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1A1917" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="460" rx="16" fill="#F5F4F0"/>

  <!-- Header -->
  <rect x="24" y="20" width="752" height="52" rx="12" fill="#1E3A5F"/>
  <text x="400" y="53" text-anchor="middle" fill="#FEFEFC" font-size="20" font-weight="700">総合考察 NG例 vs Accept例 比較</text>

  <!-- NG Example -->
  <rect x="24" y="92" width="365" height="340" rx="12" fill="#FEFEFC" stroke="#FCA5A5" stroke-width="2" filter="url(#shadow)"/>
  <!-- NG Header -->
  <rect x="24" y="92" width="365" height="44" rx="12" fill="#991B1B"/>
  <rect x="24" y="120" width="365" height="16" fill="#991B1B"/>
  <text x="60" y="119" fill="#FEFEFC" font-size="16" font-weight="700">✕ Revision・Rejectになる例</text>

  <text x="44" y="158" fill="#991B1B" font-size="12" font-weight="700">パターン1：教科書の丸写し</text>
  <rect x="44" y="166" width="325" height="48" rx="6" fill="#FEE2E2"/>
  <text x="54" y="182" fill="#6B6760" font-size="10">「心不全はFranklingの法則に基づき前負荷・</text>
  <text x="54" y="196" fill="#6B6760" font-size="10">後負荷・心収縮力で規定される...」← 自験例と無関係</text>

  <text x="44" y="238" fill="#991B1B" font-size="12" font-weight="700">パターン2：感想文になっている</text>
  <rect x="44" y="246" width="325" height="48" rx="6" fill="#FEE2E2"/>
  <text x="54" y="262" fill="#6B6760" font-size="10">「とても勉強になった症例だった。今後の</text>
  <text x="54" y="276" fill="#6B6760" font-size="10">臨床に活かしていきたい」← 具体性ゼロ</text>

  <text x="44" y="318" fill="#991B1B" font-size="12" font-weight="700">パターン3：全人的視点の欠如</text>
  <rect x="44" y="326" width="325" height="48" rx="6" fill="#FEE2E2"/>
  <text x="54" y="342" fill="#6B6760" font-size="10">医学的考察のみで終わり、患者の社会的・</text>
  <text x="54" y="356" fill="#6B6760" font-size="10">心理的背景への言及なし ← 最重要要件の欠落</text>

  <!-- 矢印コネクタ -->
  <rect x="396" y="236" width="10" height="3" rx="1.5" fill="#1B4F3A"/>
  <polygon points="406,230 416,237.5 406,245" fill="#1B4F3A"/>

  <!-- Accept Example -->
  <rect x="411" y="92" width="365" height="340" rx="12" fill="#FEFEFC" stroke="#86EFAC" stroke-width="2" filter="url(#shadow)"/>
  <!-- Accept Header -->
  <rect x="411" y="92" width="365" height="44" rx="12" fill="#166534"/>
  <rect x="411" y="120" width="365" height="16" fill="#166534"/>
  <text x="447" y="119" fill="#FEFEFC" font-size="16" font-weight="700">◯ Acceptされる総合考察の構成</text>

  <!-- Accept structure -->
  <rect x="431" y="150" width="325" height="56" rx="8" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <text x="441" y="168" fill="#166534" font-size="12" font-weight="700">① 医学的考察（約50%）</text>
  <text x="441" y="186" fill="#6B6760" font-size="10">自験例の診断・治療を文献引用で客観的に評価</text>

  <rect x="431" y="218" width="325" height="68" rx="8" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <text x="441" y="236" fill="#166534" font-size="12" font-weight="700">② 全人的考察（約35%）</text>
  <text x="441" y="254" fill="#6B6760" font-size="10">患者の社会的背景・心理面・退院後の生活</text>
  <text x="441" y="270" fill="#6B6760" font-size="10">→ その症例がonly oneになる最大のポイント</text>

  <rect x="431" y="298" width="325" height="56" rx="8" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <text x="441" y="316" fill="#166534" font-size="12" font-weight="700">③ 自己省察（約15%）</text>
  <text x="441" y="334" fill="#6B6760" font-size="10">症例から学んだこと、今後の臨床への展望</text>

  <!-- ポイントバッジ -->
  <rect x="431" y="366" width="325" height="48" rx="8" fill="#E8F0EC"/>
  <text x="593" y="386" text-anchor="middle" fill="#1B4F3A" font-size="11" font-weight="700">この3要素を「自験例に即して」</text>
  <text x="593" y="402" text-anchor="middle" fill="#1B4F3A" font-size="11" font-weight="700">具体的に書くことがAcceptの条件</text>

  <!-- Copyright -->
  <text x="776" y="456" text-anchor="end" fill="#C8C4BC" font-size="9">© 内科ナビ naikanavi.com</text>
</svg>
